<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* 1. REGRA DE OURO: Impede que qualquer elemento ultrapasse a largura da tela */
  * {
    box-sizing: border-box;
  }

  :root { 
    --primary: #22C55E; 
    --bg: #000000; 
    --border-input: #2A3441;
  }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    overflow-x: hidden; /* 2. Mata qualquer chance de o botão dançar para o lado */
  }

  body { 
    font-family:'Inter', sans-serif; 
    color:#FFF; 
    padding: 20px; 
    display: flex;
    flex-direction: column; 
  }
  
  .main-content {
    flex: 1;
    width: 100%;
  }

  .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
  .back-btn { background: none; border: none; color: white; cursor: pointer; padding: 0; display: flex; align-items: center; }
  
  .saldo-badge { 
    background: rgba(34, 197, 94, 0.15); 
    padding: 8px 15px; border-radius: 30px; 
    color: var(--primary); font-size: 13px; font-weight: 700; 
    display: inline-block; margin-bottom: 35px; 
  }

  .input-group { margin-bottom: 30px; }
  .label-input { color: #9CA3AF; font-size: 14px; display: block; margin-bottom: 8px; }
  
  input {
    background: transparent !important;
    border: none;
    border-bottom: 2px solid var(--border-input);
    color: #FFFFFF !important;
    font-size: 20px;
    font-weight: 500;
    padding: 12px 0;
    width: 100%;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
  }
  input:focus { border-bottom-color: var(--primary); }
  
  #feedbackDestino { 
    display: none; background: #111827; padding: 15px; 
    border-radius: 12px; margin-top: -15px; margin-bottom: 25px; 
    border: 1px solid #1F2937; 
  }
  .dest-name { display: block; font-weight: 700; color: #FFF; font-size: 15px; }
  .dest-bank { font-size: 11px; color: #6B7280; text-transform: uppercase; margin-top: 2px; }

  .valor-input { font-size: 42px !important; font-weight: 800 !important; color: var(--primary) !important; }

  /* 3. Ajustado para o botão ficar alinhado com os inputs */
  .footer-action { 
    padding: 20px 0; /* Removemos o padding lateral aqui */
    margin-top: auto; 
    width: 100%;
    background: var(--bg);
  }

  .confirm-btn { 
    width: 100%; /* Agora ele obedece o padding de 20px do body */
    background: #27272a; 
    color: #71717a; 
    border: none; 
    padding: 18px; 
    border-radius: 15px; 
    font-weight: 700; 
    font-size: 16px;
    transition: 0.3s;
    display: block; /* Garante que se comporte como bloco */
    cursor: pointer;
  }

  .confirm-btn.active { 
    background: var(--primary); 
    color: #000; 
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
  }

  .confirm-btn:active {
    transform: scale(0.98);
  }
</style>
  
  
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='pix.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <h2 style="margin:0; font-size:18px;">Transferir</h2>
</div>

<div class="saldo-badge">Saldo disponível: <span id="saldoAtual">R$ 0,00</span></div>

<div class="input-group">
  <span class="label-input">Chave Pix (CPF, Celular ou CNPJ)</span>
  <input type="text" id="chavePix" placeholder="000.000.000-00" inputmode="numeric">
</div>

<div id="feedbackDestino">
    <span class="dest-name">Leonardo Candido</span>
    <span class="dest-bank">Nu Pagamentos - 001</span>
</div>

<div class="input-group">
  <span class="label-input">Valor do Pix</span>
  <input type="text" id="valorInput" class="valor-input" placeholder="R$ 0,00" inputmode="numeric">
</div>

<div class="footer-action">
    <button class="confirm-btn" id="btnProsseguir" onclick="irParaRevisao()" disabled>Continuar</button>
</div>
  
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
    authDomain: "zentry-app-74275.firebaseapp.com",
    projectId: "zentry-app-74275",
    storageBucket: "zentry-app-74275.appspot.com",
    messagingSenderId: "571422826071",
    appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const chaveInput = document.getElementById("chavePix");
  const valorInput = document.getElementById("valorInput");
  const btn = document.getElementById("btnProsseguir");
  const feedback = document.getElementById("feedbackDestino");
  const saldoElement = document.getElementById("saldoAtual");

  let saldoDisponivel = 0;
  let destinoEncontrado = null;

  onAuthStateChanged(auth, (user) => {
    if (user) {
      onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
        if (docSnap.exists()) {
          saldoDisponivel = parseFloat(docSnap.data().saldo || 0);
          saldoElement.innerText = saldoDisponivel.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
      });
    } else {
      setTimeout(() => { if(!auth.currentUser) window.location.href = "login.html"; }, 3000);
    }
  });

  // BUSCA REFORÇADA (Tenta achar de qualquer jeito)
  async function buscarDestinatario(valorOriginal) {
    const limpa = valorOriginal.replace(/\D/g, "");
    if (limpa.length < 11) return;

    try {
      const colRef = collection(db, "usuarios");
      // Tenta buscar pela chave limpa (só números)
      let q = query(colRef, where("chavePix", "==", limpa));
      let snap = await getDocs(q);

      // Se não achar, tenta buscar pela chave formatada (com pontos/traços)
      if (snap.empty) {
        q = query(colRef, where("chavePix", "==", valorOriginal));
        snap = await getDocs(q);
      }

      if (!snap.empty) {
        const userDoc = snap.docs[0];
        destinoEncontrado = { id: userDoc.id, ...userDoc.data() };
        document.querySelector(".dest-name").innerText = destinoEncontrado.nome;
        feedback.style.display = "block";
        console.log("Destinatário encontrado!");
      } else {
        destinoEncontrado = null;
        feedback.style.display = "none";
      }
      validar();
    } catch (e) { console.error(e); }
  }

  // MÁSCARA SIMPLIFICADA PARA NÃO TRAVAR O CPF
  chaveInput.addEventListener("input", (e) => {
    let v = e.target.value.replace(/\D/g, "");
    
    if (v.length <= 11) {
      // Se começar com 0 ou o 3º dígito for 9, trata como Celular, senão CPF
      if (v.length === 11 && v[2] === "9") {
        v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
      } else {
        v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
      }
    } else {
      v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
    }
    
    e.target.value = v;
    if (v.replace(/\D/g, "").length >= 11) buscarDestinatario(e.target.value);
  });

  valorInput.addEventListener("input", (e) => {
    let v = e.target.value.replace(/\D/g,'');
    v = (v/100).toFixed(2) + '';
    v = v.replace(".", ",");
    v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    e.target.value = "R$ " + v;
    validar();
  });

  function validar() {
    const valorNum = parseFloat(valorInput.value.replace("R$ ", "").replace(/\./g, "").replace(",", ".")) || 0;
    
    // FORÇAR ATIVAÇÃO DO BOTÃO
    if (destinoEncontrado && valorNum > 0 && valorNum <= saldoDisponivel) {
      btn.disabled = false;
      btn.style.backgroundColor = "#22C55E";
      btn.style.color = "#000";
      btn.style.opacity = "1";
      btn.style.cursor = "pointer";
    } else {
      btn.disabled = true;
      btn.style.backgroundColor = "#27272a";
      btn.style.color = "#71717a";
      btn.style.opacity = "0.5";
    }
  }

  window.irParaRevisao = function() {
    if(!destinoEncontrado) return alert("Busque um destino válido primeiro");
    
    const info = {
        valor: valorInput.value,
        valorNumerico: parseFloat(valorInput.value.replace("R$ ", "").replace(/\./g, "").replace(",", ".")),
        nomeDestino: destinoEncontrado.nome,
        uidDestino: destinoEncontrado.id,
        bancoDestino: "Zentry Bank",
        tipo: "pix"
    };
    localStorage.setItem("transacao_pendente", JSON.stringify(info));
    window.location.href = 'revisao.html';
  };
</script>
  
  
</body>
</html>
