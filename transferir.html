<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Transferir - ZENTRY</title>
    <style>
        :root {
            --primary: #22c55e;
            --bg: #000000;
            --card: #111111;
            --card-light: #1a1a1a;
            --border: rgba(255,255,255,0.1);
            --text-muted: #888888;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Sora', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header Estilo App */
        .app-bar {
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .back-btn { font-size: 24px; cursor: pointer; }
        .bar-title { font-size: 16px; font-weight: 700; }
        .saldo-top { font-size: 12px; color: var(--primary); font-weight: 600; }

        /* Indicador de Etapas */
        .steps {
            display: flex;
            gap: 8px;
            padding: 0 20px 20px;
        }
        .step-dot {
            height: 4px;
            flex: 1;
            background: #333;
            border-radius: 10px;
            transition: 0.3s;
        }
        .step-dot.active { background: var(--primary); }

        /* Container de Telas */
        .content {
            flex: 1;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
        }

        .tela { display: none; flex-direction: column; height: 100%; }
        .tela.ativa { display: flex; animation: fadeIn 0.3s ease-out; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .tela-titulo { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .tela-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }

        /* Estilo dos Inputs */
        .input-group {
            background: var(--card);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .tipos-grid { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
        .tipo-chip {
            padding: 8px 16px;
            background: #222;
            border-radius: 100px;
            font-size: 12px;
            color: #666;
            white-space: nowrap;
            cursor: pointer;
        }
        .tipo-chip.active { background: var(--primary); color: #000; font-weight: 700; }

        .chave-box { display: flex; align-items: center; gap: 15px; }
        .chave-box input {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 18px;
            font-family: inherit;
            width: 100%;
            outline: none;
        }

        /* Card Destinatário */
        .destino-card {
            margin-top: 20px;
            background: var(--card-light);
            padding: 15px;
            border-radius: 20px;
            display: none;
            align-items: center;
            gap: 12px;
        }
        .destino-card.visivel { display: flex; }
        .dest-avatar {
            width: 45px; height: 45px;
            background: var(--primary);
            border-radius: 15px;
            color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
        }

        /* Tela de Valor Gigante */
        .valor-hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .valor-label { font-size: 14px; color: var(--text-muted); margin-bottom: 10px; }
        .valor-input-wrap { display: flex; align-items: baseline; gap: 5px; }
        .valor-prefix { font-size: 30px; font-weight: 800; color: var(--primary); }
        .valor-input {
            background: transparent; border: none; outline: none;
            color: #fff; font-size: 60px; font-weight: 800;
            width: 250px; text-align: center; font-family: inherit;
        }

        /* PIN / Senha */
        .pin-dots { display: flex; gap: 20px; justify-content: center; margin-top: 30px; }
        .pin-dot {
            width: 18px; height: 18px;
            border-radius: 50%;
            border: 2px solid #333;
        }
        .pin-dot.ok { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* Botão de Ação */
        .footer-action { padding: 20px; }
        .btn-main {
            width: 100%;
            background: var(--primary);
            color: #000;
            border: none;
            padding: 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-main:disabled { background: #222; color: #555; }

        #hiddenPin { position: absolute; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>

<input type="number" id="hiddenPin" inputmode="numeric" maxlength="4">

<div class="app-bar">
    <div class="back-btn" onclick="voltarEtapa()"></div>
    <span class="bar-title" id="barTitle">Pix</span>
    <div class="saldo-top" id="displaySaldo">R$ 0,00</div>
</div>

<div class="steps">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
</div>

<div class="content">

    <div class="tela ativa" id="tela0">
        <p class="tela-titulo">Para quem?</p>
        <p class="tela-sub">Informe a chave Pix de quem vai receber.</p>
        
        <div class="input-group">
            <div class="tipos-grid">
                <div class="tipo-chip active" onclick="selecionarTipo(this)" data-tipo="cpf">CPF</div>
                <div class="tipo-chip" onclick="selecionarTipo(this)" data-tipo="celular">Celular</div>
                <div class="tipo-chip" onclick="selecionarTipo(this)" data-tipo="email">E-mail</div>
                <div class="tipo-chip" onclick="selecionarTipo(this)" data-tipo="cnpj">CNPJ</div>
            </div>
            <div class="chave-box">
                <input type="text" id="chaveInput" placeholder="000.000.000-00">
            </div>
        </div>

        <div class="destino-card" id="destinoCard">
            <div class="dest-avatar" id="destAvatar">?</div>
            <div>
                <div class="dest-nome" id="destNome">Carregando...</div>
                <div style="font-size: 12px; color: #666;">Zentry Bank</div>
            </div>
        </div>
    </div>

    <div class="tela" id="tela1">
        <p class="tela-titulo">Qual o valor?</p>
        <div class="valor-hero">
            <div class="valor-label">Quanto você quer enviar?</div>
            <div class="valor-input-wrap">
                <span class="valor-prefix">R$</span>
                <input class="valor-input" type="text" id="valorInput" placeholder="0,00" inputmode="numeric">
            </div>
            <div id="saldoDisp" style="font-size: 12px; margin-top: 15px; color: #555;">Saldo: R$ 0,00</div>
        </div>
    </div>

    <div class="tela" id="tela2">
        <p class="tela-titulo">Confirme com senha</p>
        <p class="tela-sub">Digite seu PIN de 4 dígitos para autorizar.</p>
        
        <div class="input-group" style="text-align: center; padding: 40px 20px;" onclick="document.getElementById('hiddenPin').focus()">
            <div id="confirmNome" style="font-size: 18px; font-weight: 700; margin-bottom: 5px;">Nome do Destinatário</div>
            <div id="confirmValor" style="font-size: 24px; font-weight: 800; color: var(--primary);">R$ 0,00</div>
            
            <div class="pin-dots">
                <div class="pin-dot" id="p1"></div>
                <div class="pin-dot" id="p2"></div>
                <div class="pin-dot" id="p3"></div>
                <div class="pin-dot" id="p4"></div>
            </div>
        </div>
    </div>

    <div class="tela" id="tela3">
        <div class="valor-hero">
            <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 30px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;">
                <span style="color: #000; font-size: 40px; font-weight: 800;">✓</span>
            </div>
            <p class="tela-titulo">Pix enviado!</p>
            <p id="sucessoSub" style="color: #666; text-align: center;"></p>
        </div>
    </div>

</div>

<div class="footer-action">
    <button class="btn-main" id="btnMain" onclick="avancarEtapa()" disabled>Continuar</button>
</div>

<script type="module">
    import { auth, db, ZentryAuth, ZentryUser, ZentryUI } from './zentry-core.js';
    import { doc, getDoc, setDoc, updateDoc, collection, query, where, getDocs, limit, increment } 
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let userUid = "", saldoAtual = 0, etapa = 0;
    let destinoEncontrado = null, tipoChave = "cpf";
    let dadosTransacao = null;

    async function init() {
        const user = await ZentryAuth.exigirLogin();
        userUid = user.uid;
        ZentryUser.escutar(userUid, (d) => {
            saldoAtual = Number(d.saldo || 0);
            document.getElementById('displaySaldo').innerText = ZentryUI.formatarMoeda(saldoAtual);
            document.getElementById('saldoDisp').innerText = "Saldo disponível: " + ZentryUI.formatarMoeda(saldoAtual);
        });
        document.getElementById('hiddenPin').addEventListener('input', onPin);
    }
    init();

    window.selecionarTipo = function(el) {
        document.querySelectorAll('.tipo-chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        tipoChave = el.dataset.tipo;
        document.getElementById('chaveInput').value = '';
        document.getElementById('destinoCard').classList.remove('visivel');
        destinoEncontrado = null;
    };

    document.getElementById('chaveInput').addEventListener('input', async function(e) {
        const val = e.target.value;
        if(val.length >= 11) {
            await buscarDestinatario(val);
        }
    });

    async function buscarDestinatario(chave) {
        const campo = tipoChave === 'email' ? 'chavepix' : tipoChave;
        const q = query(collection(db, "usuarios"), where(campo, "==", chave), limit(1));
        const snap = await getDocs(q);
        
        if (!snap.empty) {
            destinoEncontrado = { uid: snap.docs[0].id, ...snap.docs[0].data() };
            document.getElementById('destNome').innerText = destinoEncontrado.nome;
            document.getElementById('destAvatar').innerText = destinoEncontrado.nome[0];
            document.getElementById('destinoCard').classList.add('visivel');
            document.getElementById('btnMain').disabled = false;
        }
    }

    document.getElementById('valorInput').addEventListener('input', function(e) {
        let v = e.target.value.replace(/\D/g,'');
        v = (parseInt(v||'0') / 100).toFixed(2).replace('.',',');
        e.target.value = v;
        document.getElementById('btnMain').disabled = parseFloat(v.replace(',','.')) <= 0;
    });

    function onPin() {
        const pin = document.getElementById('hiddenPin').value;
        for (let i=1; i<=4; i++) {
            document.getElementById(`p${i}`).className = 'pin-dot' + (i <= pin.length ? ' ok' : '');
        }
        if(pin.length === 4) document.getElementById('btnMain').disabled = false;
    }

    function atualizarDots() {
        for (let i=0; i<4; i++) {
            document.getElementById(`dot${i}`).classList.toggle('active', i === etapa);
        }
    }

    window.avancarEtapa = async function() {
        const telas = ['tela0', 'tela1', 'tela2', 'tela3'];
        
        if(etapa === 0) {
            document.getElementById(telas[etapa]).classList.remove('ativa');
            etapa++;
            document.getElementById(telas[etapa]).classList.add('ativa');
            document.getElementById('btnMain').disabled = true;
        } else if(etapa === 1) {
            const v = parseFloat(document.getElementById('valorInput').value.replace(',','.'));
            if(v > saldoAtual) return ZentryUI.toast("Saldo insuficiente", "erro");
            
            dadosTransacao = { valor: v, destino: destinoEncontrado };
            document.getElementById('confirmNome').innerText = destinoEncontrado.nome;
            document.getElementById('confirmValor').innerText = ZentryUI.formatarMoeda(v);
            
            document.getElementById(telas[etapa]).classList.remove('ativa');
            etapa++;
            document.getElementById(telas[etapa]).classList.add('ativa');
            document.getElementById('btnMain').innerText = "Confirmar";
            document.getElementById('btnMain').disabled = true;
        } else if(etapa === 2) {
            // Lógica de envio simplificada para o exemplo
            document.getElementById(telas[etapa]).classList.remove('ativa');
            etapa++;
            document.getElementById(telas[etapa]).classList.add('ativa');
            document.getElementById('btnMain').innerText = "Voltar ao Início";
            document.getElementById('sucessoSub').innerText = `R$ ${dadosTransacao.valor.toFixed(2)} enviado para ${dadosTransacao.destino.nome}`;
        } else {
            window.location.href = "home.html";
        }
        atualizarDots();
    };

    window.voltarEtapa = function() {
        if(etapa === 0) return window.history.back();
        const telas = ['tela0', 'tela1', 'tela2', 'tela3'];
        document.getElementById(telas[etapa]).classList.remove('ativa');
        etapa--;
        document.getElementById(telas[etapa]).classList.add('ativa');
        atualizarDots();
    };
</script>

</body>
</html>
