<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* 1. REGRA DE OURO: Impede que qualquer elemento ultrapasse a largura da tela */
  * {
    box-sizing: border-box;
  }

  :root { 
    --primary: #22C55E; 
    --bg: #000000; 
    --border-input: #2A3441;
  }

  html, body {
    height: 100%;
    margin: 0;
    background: var(--bg);
    overflow-x: hidden; /* 2. Mata qualquer chance de o botão dançar para o lado */
  }

  body { 
    font-family:'Inter', sans-serif; 
    color:#FFF; 
    padding: 20px; 
    display: flex;
    flex-direction: column; 
  }
  
  .main-content {
    flex: 1;
    width: 100%;
  }

  .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
  .back-btn { background: none; border: none; color: white; cursor: pointer; padding: 0; display: flex; align-items: center; }
  
  .saldo-badge { 
    background: rgba(34, 197, 94, 0.15); 
    padding: 8px 15px; border-radius: 30px; 
    color: var(--primary); font-size: 13px; font-weight: 700; 
    display: inline-block; margin-bottom: 35px; 
  }

  .input-group { margin-bottom: 30px; }
  .label-input { color: #9CA3AF; font-size: 14px; display: block; margin-bottom: 8px; }
  
  input {
    background: transparent !important;
    border: none;
    border-bottom: 2px solid var(--border-input);
    color: #FFFFFF !important;
    font-size: 20px;
    font-weight: 500;
    padding: 12px 0;
    width: 100%;
    outline: none;
    border-radius: 0;
    -webkit-appearance: none;
  }
  input:focus { border-bottom-color: var(--primary); }
  
  #feedbackDestino { 
    display: none; background: #111827; padding: 15px; 
    border-radius: 12px; margin-top: -15px; margin-bottom: 25px; 
    border: 1px solid #1F2937; 
  }
  .dest-name { display: block; font-weight: 700; color: #FFF; font-size: 15px; }
  .dest-bank { font-size: 11px; color: #6B7280; text-transform: uppercase; margin-top: 2px; }

  .valor-input { font-size: 42px !important; font-weight: 800 !important; color: var(--primary) !important; }

  /* 3. Ajustado para o botão ficar alinhado com os inputs */
  .footer-action { 
    padding: 20px 0; /* Removemos o padding lateral aqui */
    margin-top: auto; 
    width: 100%;
    background: var(--bg);
  }

  .confirm-btn { 
    width: 100%; /* Agora ele obedece o padding de 20px do body */
    background: #27272a; 
    color: #71717a; 
    border: none; 
    padding: 18px; 
    border-radius: 15px; 
    font-weight: 700; 
    font-size: 16px;
    transition: 0.3s;
    display: block; /* Garante que se comporte como bloco */
    cursor: pointer;
  }

  .confirm-btn.active { 
    background: var(--primary); 
    color: #000; 
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);
  }

  .confirm-btn:active {
    transform: scale(0.98);
  }
</style>
  
  
</head>
<body>

<div class="header">
  <button class="back-btn" onclick="location.href='pix.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <h2 style="margin:0; font-size:18px;">Transferir</h2>
</div>

<div class="saldo-badge">Saldo disponível: <span id="saldoAtual">R$ 0,00</span></div>

<div class="input-group">
  <span class="label-input">Chave Pix (CPF, Celular ou CNPJ)</span>
  <input type="text" id="chavePix" placeholder="000.000.000-00" inputmode="numeric">
</div>

<div id="feedbackDestino">
    <span class="dest-name">Leonardo Candido</span>
    <span class="dest-bank">Nu Pagamentos - 001</span>
</div>

<div class="input-group">
  <span class="label-input">Valor do Pix</span>
  <input type="text" id="valorInput" class="valor-input" placeholder="R$ 0,00" inputmode="numeric">
</div>

<div class="footer-action">
    <button class="confirm-btn" id="btnProsseguir" onclick="irParaRevisao()" disabled>Continuar</button>
</div>

<script>
  const chaveInput = document.getElementById("chavePix");
  const valorInput = document.getElementById("valorInput");
  const btn = document.getElementById("btnProsseguir");
  const feedback = document.getElementById("feedbackDestino");

  // Saldo
  const saldoOriginal = parseFloat(localStorage.getItem("saldo")) || 1250.00;
  document.getElementById("saldoAtual").innerText = saldoOriginal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

  // MÁSCARA INTELIGENTE: CPF / CELULAR / CNPJ
  chaveInput.addEventListener("input", (e) => {
    let v = e.target.value.replace(/\D/g, ""); // Remove tudo que não é número
    
    if (v.length <= 11) {
      // CPF ou Celular?
      if (v.length > 10) {
        // Celular: (00) 00000-0000
        v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
      } else {
        // CPF: 000.000.000-00
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d)/, "$1.$2");
        v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      }
    } else {
      // CNPJ: 00.000.000/0000-00
      v = v.replace(/^(\d{2})(\d)/, "$1.$2");
      v = v.replace(/^(\d{2})\.(\d{3})(\d)/, "$1.$2.$3");
      v = v.replace(/\.(\d{3})(\d)/, ".$1/$2");
      v = v.replace(/(\d{4})(\d)/, "$1-$2");
    }
    
    e.target.value = v;
    feedback.style.display = v.length >= 14 ? "block" : "none"; // Só mostra o nome se a chave estiver quase completa
    validar();
  });

  // MÁSCARA DE DINHEIRO (R$ 0,00)
  valorInput.addEventListener("input", (e) => {
    let v = e.target.value.replace(/\D/g,'');
    if (v === "") v = "0";
    v = (v/100).toFixed(2) + '';
    v = v.replace(".", ",");
    v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    e.target.value = "R$ " + v;
    validar();
  });

  function validar() {
    const valorLimpo = valorInput.value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
    const valorNum = parseFloat(valorLimpo) || 0;
    const chaveLimpa = chaveInput.value.replace(/\D/g, "");
    
    if(chaveLimpa.length >= 11 && valorNum > 0) {
      btn.classList.add("active");
      btn.disabled = false;
    } else {
      btn.classList.remove("active");
      btn.disabled = true;
    }
  }
function irParaRevisao() {
    const valorDigitado = valorInput.value;
    const chave = chaveInput.value;
    const nomeDestino = document.querySelector(".dest-name").innerText;
    const bancoDestino = document.querySelector(".dest-bank").innerText;

    // Criamos o objeto que a tela de comprovante entende
    const dadosComprovante = {
        tipo: "pix",
        valor: valorDigitado,
        nome: nomeDestino,
        banco: bancoDestino,
        data: new Date().toLocaleString('pt-BR'),
        id: "TP" + Math.floor(Math.random() * 9999999)
    };

    // Salvamos exatamente como o script do comprovante vai buscar
    localStorage.setItem("comprovante", JSON.stringify(dadosComprovante));
    
    // Mantemos os seus antigos por segurança caso use na revisão
    localStorage.setItem("tipoOperacao", "Pix");
    localStorage.setItem("ultimoValor", valorDigitado);
    localStorage.setItem("chaveDigitada", chave);

    window.location.href = 'revisao.html';
}
  

</script>
</body>
</html>
