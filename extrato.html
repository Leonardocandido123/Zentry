<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Extrato - Zentry</title>
    <style>
        :root {
            --primary: #22c55e;
            --bg: #060910;
            --card: #0f1623;
            --card2: #161f2e;
            --border: rgba(255,255,255,0.07);
            --text: #fff;
            --text-muted: #6b7a99;
            --red: #ef4444;
            --green: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

        .header { padding: 16px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .btn-back { width: 40px; height: 40px; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; color: #fff; }
        
        .card-saldo { margin: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
        .card-saldo span { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .card-saldo h2 { font-size: 30px; font-weight: 800; margin-top: 8px; color: var(--primary); }

        .filters { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; }
        .filters::-webkit-scrollbar { display: none; }
        .filter { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); font-weight: 600; font-size: 13px; cursor: pointer; }
        .filter.active { background: var(--primary); color: #052e16; border-color: var(--primary); }

        .data-header { padding: 8px 20px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .lista { display: flex; flex-direction: column; gap: 2px; padding: 0 20px; }
        .item { background: var(--card); padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; }
        .icon-box { width: 46px; height: 46px; background: var(--card2); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .info b { display: block; font-size: 14px; font-weight: 700; color: #fff; }
        .info span { font-size: 11px; color: var(--text-muted); }
        .val { font-size: 15px; font-weight: 800; }
        .val.pos { color: var(--green); }
        .val.neg { color: var(--red); }

        .loading-wrap { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--primary); animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-back" onclick="history.back()">‹</button>
    <h3>Movimentações</h3>
</div>

<div class="card-saldo">
    <span>Saldo disponível</span>
    <h2 id="txtSaldo">...</h2>
</div>

<div class="filters">
    <button class="filter active" data-type="todos">Tudo</button>
    <button class="filter" data-type="entrada">Entradas</button>
    <button class="filter" data-type="saida">Saídas</button>
</div>

<div id="listaExtrato" class="lista">
    <div class="loading-wrap">
        <div class="spinner"></div>
        Carregando...
    </div>
</div>
<script type="module">
    // Importamos as ferramentas do seu core
    import { db, ZentryUI, ZentryUser } from './zentry-core.js';
    import { collection, onSnapshot, query, orderBy, doc, where, getDocs, limit } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let uidAtual = "";
    let transacoesCache = [];

    async function init() {
        // 1. Pegamos o e-mail que o novo cadastro/login salvou
        const emailLogado = localStorage.getItem("usuarioEmail");
        
        if (!emailLogado) {
            console.log("Sem e-mail salvo. Redirecionando...");
            window.location.href = "login.html";
            return;
        }

        // 2. BUSCA O ID (UID) NO FIREBASE USANDO O EMAIL
        // Isso resolve o problema de você conseguir testar sem ser expulso
        try {
            const qUser = query(collection(db, "usuarios"), where("email", "==", emailLogado), limit(1));
            const userSnap = await getDocs(qUser);

            if (userSnap.empty) {
                console.log("Usuário não encontrado no banco.");
                return;
            }

            // Pegamos o ID do documento (Ex: ABC123XYZ)
            uidAtual = userSnap.docs[0].id;

            // 3. AGORA SIM: Escutar Saldo em Tempo Real usando o ID encontrado
            onSnapshot(doc(db, "usuarios", uidAtual), (ds) => {
                if (ds.exists()) {
                    document.getElementById('txtSaldo').innerText = ZentryUI.formatarMoeda(ds.data().saldo || 0);
                }
            });

            // 4. Escutar Transações em Tempo Real
            const qTx = query(
                collection(db, "usuarios", uidAtual, "transacoes"), 
                orderBy("timestamp", "desc")
            );

            onSnapshot(qTx, (snap) => {
                transacoesCache = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar("todos");
            });

        } catch (error) {
            console.error("Erro no carregamento:", error);
        }
    }

    function renderizar(filtro) {
        const lista = document.getElementById('listaExtrato');
        
        let filtradas = transacoesCache.filter(t => {
            if (filtro === "entrada") return t.tipo === "entrada";
            if (filtro === "saida") return t.tipo === "saida";
            return true;
        });

        if (filtradas.length === 0) {
            lista.innerHTML = `<div style="text-align:center; padding:40px; color:#6b7a99;">Nenhuma movimentação.</div>`;
            return;
        }

        lista.innerHTML = "";
        filtradas.forEach(t => {
            const ehEntrada = t.tipo === "entrada";
            
            // Tratamento da data para não dar erro de toDate()
            let dataFinal = "Recentemente";
            let horaFinal = "";
            
            if (t.timestamp && t.timestamp.toDate) {
                const d = t.timestamp.toDate();
                dataFinal = d.toLocaleDateString('pt-BR');
                horaFinal = d.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            }

            lista.innerHTML += `
                <div class="item" onclick="window.location.href='comprovante.html?id=${t.id}'">
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div class="icon-box" style="background: ${ehEntrada ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'};">
                            ${ehEntrada ? '💚' : '💸'}
                        </div>
                        <div class="info">
                            <b>${t.descricao || 'Transação'}</b>
                            <span>${dataFinal} • ${horaFinal}</span>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div class="val ${ehEntrada ? 'pos' : 'neg'}">
                            ${ehEntrada ? '+' : '-'} ${ZentryUI.formatarMoeda(t.valor)}
                        </div>
                    </div>
                </div>`;
        });
    }

    // Inicializa tudo
    init();
// ... dentro da função init() do Extrato, após pegar o uidAtual:
uidAtual = userSnap.docs[0].id;

// ADICIONE ESTA LINHA ABAIXO:
localStorage.setItem("idUsuarioLogado", uidAtual); 

console.log("ID salvo para o comprovante:", uidAtual);
// ... resto do código
    
    // Filtros
    document.querySelectorAll('.filter').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderizar(btn.dataset.type);
        };
    });
</script>
    

</body>
</html>
