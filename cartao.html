<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Cartão UP TECH</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #22c55e; --border: #222; --text-muted: #888; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow-x: hidden; }
        
        /* ANIMAÇÃO DE ENTRADA */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container { 
            padding: 20px; 
            max-width: 450px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 120px;
            animation: fadeInUp 0.6s ease-out;
        }

        /* HEADER */
        .app-header { width: 100%; padding: 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* CARTÃO PREMIUM */
     .card-preview {
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
}
.card-preview:active {
    transform: rotateY(10deg) rotateX(10deg) scale(0.95);
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.4);
}

        /* Detalhe Neon */
        .card-preview::after {
            content: "";
            position: absolute;
            top: 0; right: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle at top right, rgba(34, 197, 94, 0.15), transparent 70%);
            pointer-events: none;
        }

        /* CHIP REALISTA */
        .chip-svg {
            width: 42px;
            height: 32px;
            filter: drop-shadow(0px 1px 1px rgba(0,0,0,0.5));
        }

        /* BENEFÍCIOS */
        .info-section { width: 100%; margin-top: 10px; }
        .info-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #fff; }
        
        .benefit { 
            display: flex; gap: 15px; background: var(--card); padding: 18px; 
            border-radius: 22px; border: 1px solid var(--border); margin-bottom: 12px;
            align-items: center;
        }
        .benefit-icon { font-size: 20px; background: rgba(34, 197, 94, 0.1); width: 42px; height: 42px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--accent); }
        .benefit-content b { display: block; font-size: 14px; margin-bottom: 2px; color: #fff; }
        .benefit-content span { font-size: 12px; color: var(--text-muted); line-height: 1.4; }

        /* RODAPÉ E BOTÃO */
        .footer-action { position: fixed; bottom: 0; left: 0; right: 0; padding: 25px; background: linear-gradient(0deg, #000 70%, transparent); z-index: 100; display: flex; justify-content: center; }
        .btn-confirm { width: 100%; max-width: 350px; padding: 20px; border-radius: 22px; border: none; background: var(--accent); color: #000; font-weight: 700; font-size: 16px; cursor: pointer; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3); transition: 0.2s; }
        .btn-confirm:active { transform: scale(0.96); }

        /* LOADING */
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { width: 45px; height: 45px; border: 4px solid #111; border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <b style="font-size: 18px;">Autenticando...</b>
        <p style="color: #666; font-size: 13px;">Segurança Criptografada</p>
    </div>

    <header class="app-header">
        <div class="back-btn" onclick="location.href='home.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <b style="font-size: 14px; letter-spacing: 1px;">CARTÃO VIRTUAL</b>
        <div style="width: 40px;"></div>
    </header>

    <div class="container">
        <div class="card-wrapper">
            <div class="card-preview">
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <b style="letter-spacing: -1px; font-size: 20px; font-weight: 800; color: #fff;">UP TECH</b>
                    
                    <svg class="chip-svg" viewBox="0 0 42 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect width="42" height="32" rx="6" fill="url(#chip_grad)"/>
                        <path d="M0 16H8M34 16H42M21 0V8M21 24V32" stroke="#6B5329" stroke-width="0.5"/>
                        <rect x="8" y="8" width="6" height="6" rx="1" stroke="#6B5329" stroke-width="0.5"/>
                        <rect x="28" y="8" width="6" height="6" rx="1" stroke="#6B5329" stroke-width="0.5"/>
                        <rect x="8" y="18" width="6" height="6" rx="1" stroke="#6B5329" stroke-width="0.5"/>
                        <rect x="28" y="18" width="6" height="6" rx="1" stroke="#6B5329" stroke-width="0.5"/>
                        <rect x="16" y="8" width="10" height="16" rx="2" stroke="#6B5329" stroke-width="0.5"/>
                        <defs>
                            <linearGradient id="chip_grad" x1="0" y1="0" x2="42" y2="32" gradientUnits="userSpaceOnUse">
                                <stop stop-color="#E3C06F"/>
                                <stop offset="0.5" stop-color="#B18C4D"/>
                                <stop offset="1" stop-color="#E3C06F"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                
                <div style="font-family: monospace; font-size: 19px; letter-spacing: 3px; color: rgba(255,255,255,0.85); text-align: center; margin-top: 10px;">•••• •••• •••• 8842</div>
                
                <div style="display: flex; justify-content: space-between; align-items: flex-end;">
                    <div>
                        <small style="font-size: 9px; opacity: 0.5; display: block; margin-bottom: 2px; letter-spacing: 1px;">TITULAR</small>
                        <b id="cardHolder" style="font-size: 13px; letter-spacing: 1.5px; text-transform: uppercase;">CARREGANDO...</b>
                    </div>
                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" width="35">
                </div>
            </div>
        </div>

        <div class="info-section">
            <div class="info-title">Benefícios do seu Cartão</div>
            
            <div class="benefit">
                <div class="benefit-icon">🟢</div>
                <div class="benefit-content">
                    <b>Modalidade Débito</b>
                    <span>Uso imediato do seu saldo disponível.</span>
                </div>
            </div>

            <div class="benefit">
                <div class="benefit-icon">⚡</div>
                <div class="benefit-content">
                    <b>Aproximação</b>
                    <span>Compatível com Apple Pay e Google Pay.</span>
                </div>
            </div>

            <div class="benefit">
                <div class="benefit-icon">🛡️</div>
                <div class="benefit-content">
                    <b>Segurança Ativa</b>
                    <span>Criptografia de ponta a ponta.</span>
                </div>
            </div>
        </div>

        <div class="footer-action">
            <button class="btn-confirm" onclick="gerarCartao()">Ativar meu Cartão</button>
        </div>
    </div>

    <script>
        // Puxa o nome do usuário salvo no sistema
        window.onload = function() {
            const nomeSalvo = localStorage.getItem('nomeUsuario') || 'LEONARDO S.';
            document.getElementById('cardHolder').innerText = nomeSalvo;
        };

        function gerarCartao() {
            document.getElementById('loadingOverlay').style.display = 'flex';
            setTimeout(() => {
                location.href = 'configurar_cartao.html';
            }, 2000);
        }
    </script>
</body>
</html>
