<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentap Pro</title>

<style>
:root{
  --primary:#22c55e;
  --bg:#060910;
  --card:#0f1623;
  --border:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:sans-serif;
  background:var(--bg);
  color:#fff;
}

/* TELAS */
.screen{display:none;padding:20px;height:100vh}
.screen.ativa{display:block}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* VALOR */
.valor{
  font-size:52px;
  text-align:center;
  margin:60px 0;
  font-weight:800;
}

/* BOTÕES */
.btn{
  width:100%;
  padding:18px;
  border:none;
  border-radius:16px;
  font-weight:700;
  margin-top:10px;
  font-size:16px;
}

.btn-green{
  background:var(--primary);
  color:#052e16;
}

.btn-outline{
  background:transparent;
  border:1px solid var(--primary);
  color:var(--primary);
}

/* MÉTODOS */
.metodo{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px;
  border-radius:18px;
  background:var(--card);
  margin-bottom:12px;
  border:1px solid var(--border);
}

/* STATUS PIX */
.status{
  text-align:center;
  margin-top:20px;
}

.status .title{
  font-size:20px;
  font-weight:700;
}

.status .sub{
  font-size:14px;
  opacity:.6;
}

/* LOADER */
.loader{
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid var(--border);
  border-top:4px solid var(--primary);
  animation:spin 1s linear infinite;
  margin:30px auto;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* QR */
.qr{
  background:#fff;
  padding:20px;
  border-radius:20px;
  width:220px;
  margin:20px auto;
}

/* TIMER */
.timer{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  color:#fbbf24;
}
</style>
</head>

<body>

<!-- TELA VALOR -->
<div id="t1" class="screen ativa">
  <div class="header">
    <b>ZENTAP</b>
  </div>

  <div class="valor" id="valor">R$ 0,00</div>

  <button class="btn btn-green" onclick="ir(2)">Continuar</button>
</div>

<!-- MÉTODO -->
<div id="t2" class="screen">
  <h2>Forma de pagamento</h2>

  <div class="metodo" onclick="abrirPix()">⚡ Pix</div>
  <div class="metodo" onclick="simular()">💳 Débito</div>
  <div class="metodo" onclick="simular()">💳 Crédito</div>

  <button class="btn btn-outline" onclick="ir(1)">Voltar</button>
</div>

<!-- PIX -->
<div id="t3" class="screen">
  <h2>Pix</h2>

  <div class="qr" id="qr"></div>

  <div class="timer" id="timer">Expira em 05:00</div>

  <div class="status">
    <div class="title">Aguardando pagamento</div>
    <div class="sub">Escaneie o QR Code</div>
  </div>

  <div class="loader"></div>

  <button class="btn btn-outline" onclick="ir(2)">Voltar</button>
</div>

<!-- SUCESSO -->
<div id="t4" class="screen">
  <div class="status">
    <div class="title">Pagamento recebido ✅</div>
    <div class="sub">Valor confirmado com sucesso</div>
  </div>

  <button class="btn btn-green" onclick="ir(1)">Nova venda</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function ir(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('ativa'))
  document.getElementById('t'+n).classList.add('ativa')
}

/* PIX */
function abrirPix(){
  ir(3)

  const el = document.getElementById("qr")
  el.innerHTML=""

  new QRCode(el,{
    text:"PIX-"+Date.now(),
    width:200,
    height:200
  })

  iniciarTimer()

  // 🔥 SIMULA CONFIRMAÇÃO (depois você liga no webhook real)
  setTimeout(()=>{
    ir(4)
  },6000)
}

/* TIMER */
let t=300
function iniciarTimer(){
  const el=document.getElementById("timer")
  const i=setInterval(()=>{
    t--
    let m=Math.floor(t/60)
    let s=t%60
    el.innerText=`Expira em ${m}:${s.toString().padStart(2,'0')}`
    if(t<=0) clearInterval(i)
  },1000)
}

function simular(){
  alert("Pagamento simulado")
}
</script>

</body>
</html>
