<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZENTRY Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root { 
    --accent: #22c55e; 
    --bg: #05070A;
    --border: #2A3441;
  }

  /* RESET TOTAL PARA TRAVAR A TELA */
  * { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Inter', sans-serif; 
  }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden; /* Mata a rolagem vertical e horizontal */
    position: fixed; /* Evita que o teclado do celular empurre tudo pra cima de forma errada */
  }

  body { 
    background: radial-gradient(circle at top, #0f172a, #000); 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    padding: 30px; 
    color: #fff;
  }

  .title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(to right, #fff, #9CA3AF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 15px;
    color: #9CA3AF;
    margin-bottom: 40px;
    line-height: 1.4;
  }

  .field-wrapper {
    width: 100%;
    max-width: 100%; /* Garante que não ultrapasse a largura do celular */
  }

  .password-container {
    position: relative;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    height: 60px;
    transition: 0.3s;
  }

  .password-container:focus-within {
    border-bottom-color: var(--accent);
  }

  input {
    flex: 1;
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    outline: none;
    padding-right: 100px;
    letter-spacing: 2px;
    width: 100%; /* Ocupa apenas o espaço disponível */
  }

  .actions {
    position: absolute;
    right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .eye {
    width: 24px;
    height: 24px;
    opacity: 0.4;
    cursor: pointer;
  }

  .enter-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.8);
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .enter-btn.active {
    opacity: 1;
    transform: scale(1);
  }

  .links {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding-top: 15px;
  }

  .links a {
    color: #9CA3AF;
    text-decoration: none;
    font-size: 13px;
    white-space: nowrap; /* Evita que o texto quebre em duas linhas */
  }

  .links .create-acc {
    color: var(--accent);
    font-weight: 700;
  }
</style>

</head>
<body>

  <div class="title">Acesse sua conta</div>
  <div class="subtitle">Digite sua senha ZENTRY para acessar sua conta com segurança</div>

  <div class="field-wrapper">
    <div class="password-container">
      <input type="password" id="senha" placeholder="Sua senha" autocomplete="off">
      
      <div class="actions">
        <svg class="eye" id="eyeIcon" onclick="window.toggleSenha()" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/>
          <circle cx="12" cy="12" r="3"/>
          <line id="eyeSlash" x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="2" style="opacity:1; transition: 0.2s;"/>
        </svg>

        <div class="enter-btn" id="btnEntrar" onclick="window.entrar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>
    </div>

    <div class="links">
      <a href="reset.html">Esqueci a senha</a>
      <a href="cadastro_nome.html" class="create-acc">Criar conta</a>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275",
  storageBucket: "zentry-app-74275.appspot.com",
  messagingSenderId: "571422826071",
  appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("senha");
  const btn = document.getElementById("btnEntrar");
  const eye = document.getElementById("eyeIcon");

  input.addEventListener("input", () => {
    if(input.value.length >= 6) btn.classList.add("active");
    else btn.classList.remove("active");
  });

  window.toggleSenha = function(){
    const slash = document.getElementById("eyeSlash");
    if(input.type === "password"){
      input.type = "text";
      slash.style.opacity = "0";
    } else {
      input.type = "password";
      slash.style.opacity = "1";
    }
  };

  window.entrar = function(){
    if(input.value.length < 6) return;
    const email = localStorage.getItem("usuarioEmail");
    if(!email){
      alert("Email não encontrado.");
      return;
    }

    signInWithEmailAndPassword(auth, email, input.value)
      .then(() => {
        document.body.style.opacity = "0";
        setTimeout(() => { window.location.href = "home.html"; }, 400);
      })
      .catch(() => {
        alert("Senha incorreta ou usuário não existe");
      });
  };

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") window.entrar();
  });
});
</script>
</body>
</html>
