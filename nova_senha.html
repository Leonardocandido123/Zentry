<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENTRY- Nova Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22C55E; --bg: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); height: 100vh; display: flex; flex-direction: column; padding: 20px 25px; color: white; }
        .header-area { margin-top: 60px; margin-bottom: 30px; }
        .header-area h2 { font-size: 24px; font-weight: 500; }
        .header-area p { color: #9CA3AF; font-size: 14px; margin-top: 10px; }
        .input-box { flex-grow: 1; margin-top: 20px; }
        .input-wrapper { border-bottom: 1px solid #2A3441; }
        .input-line { width: 100%; background: transparent; border: none; padding: 15px 0; color: white; font-size: 32px; outline: none; letter-spacing: 10px; }
        .footer { display: flex; justify-content: flex-end; padding-bottom: 40px; }
        .next-btn { width: 60px; height: 60px; background: #1F2937; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: none; transition: 0.3s; }
        .next-btn svg { width: 28px; height: 28px; stroke: #4B5563; stroke-width: 2.5; fill: none; }
        .next-btn.active { background: var(--primary); box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .next-btn.active svg { stroke: #000000; }
    </style>
</head>
<body>
    <div class="header-area">
        <h2>Crie sua nova senha</h2>
        <p>Defina uma nova senha de 6 dígitos para sua conta.</p>
    </div>
    <div class="input-box">
        <div class="input-wrapper">
            <input type="password" id="newPass" class="input-line" placeholder="••••••" maxlength="6" inputmode="numeric">
        </div>
    </div>
    <div class="footer">
        <button class="next-btn" id="nextBtn" onclick="salvarNovaSenha()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
    </div>

    <script>
        const passInput = document.getElementById('newPass');
        const nextBtn = document.getElementById('nextBtn');

        passInput.addEventListener('input', () => {
            passInput.value = passInput.value.replace(/\D/g, '');
            if (passInput.value.length === 6) {
                nextBtn.classList.add('active');
            } else {
                nextBtn.classList.remove('active');
            }
        });

        function salvarNovaSenha() {
            if (passInput.value.length === 6) {
                // ATUALIZA A SENHA NO "BANCO DE DADOS" (LocalStorage)
                localStorage.setItem("senhaApp", passInput.value);
                alert("Senha alterada com sucesso! Use sua nova senha para entrar.");
                window.location.href = "login.html";
            }
        }
    </script>
</body>
</html>
