<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>ZENTRY - Recarga Express</title>
    <style>
        :root { --primary: #22c55e; --bg: #000; --card: #111827; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff;
            height: 100vh; overflow: hidden; display: flex; flex-direction: column;
        }

        /* Blindagem Visual */
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        .section-title { font-size: 12px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 25px 0 15px; letter-spacing: 1px; }

        /* Input Estilizado */
        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; margin-bottom: 10px; }
        .input-box label { display: block; font-size: 10px; color: #9CA3AF; margin-bottom: 5px; font-weight: 600; }
        .input-box input { background: transparent; border: none; color: #fff; font-size: 18px; width: 100%; font-weight: 600; }

        /* Grade de Operadoras Blindada */
        .op-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .op-item { 
            background: var(--card); border: 2px solid transparent; border-radius: 16px; 
            padding: 15px 5px; text-align: center; transition: 0.2s; cursor: pointer;
        }
        .op-item img { width: 30px; height: 30px; object-fit: contain; margin-bottom: 8px; filter: grayscale(1) brightness(0.7); }
        .op-item span { display: block; font-size: 10px; font-weight: 700; color: #9CA3AF; }
        
        .op-item.active { border-color: var(--primary); background: rgba(34, 197, 94, 0.1); }
        .op-item.active img { filter: grayscale(0) brightness(1); }
        .op-item.active span { color: #fff; }

        /* Chips de Valores */
        .value-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .v-chip { 
            background: var(--card); border: 1px solid var(--border); border-radius: 12px; 
            padding: 15px; text-align: center; font-weight: 800; font-size: 14px; transition: 0.2s;
        }
        .v-chip.active { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Botão Flutuante */
        .footer-action { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, #000); }
        .btn-pay { 
            width: 100%; padding: 18px; border-radius: 16px; border: none; 
            background: var(--primary); color: #052e16; font-weight: 800; font-size: 16px;
            box-shadow: 0 10px 20px rgba(34, 197, 94, 0.3);
        }
        .btn-pay:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <div class="app-bar">
        <div class="back-btn" onclick="location.href='home.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div style="text-align: right;">
            <small style="color: #9CA3AF; font-size: 10px; font-weight: 700;">SALDO DISPONÍVEL</small>
            <div id="displaySaldo" style="color: var(--primary); font-weight: 800; font-size: 16px;">R$ 0,00</div>
        </div>
    </div>

    <div class="content">
        <h2 style="font-size: 24px; font-weight: 800; margin-bottom: 5px;">Recarga Celular</h2>
        <p style="color: #9CA3AF; font-size: 14px; margin-top: 0;">Créditos caem em até 5 minutos.</p>

        <div class="section-title">Dados da Linha</div>
        <div class="input-box">
            <label>NÚMERO DO TELEFONE</label>
            <input type="tel" id="numTel" placeholder="(00) 00000-0000">
        </div>
<div class="op-grid">
    <div class="op-item" onclick="selOp(this, 'Vivo')">
        <img src="https://logodownload.org/wp-content/uploads/2014/04/vivo-logo-1.png">
        <span>VIVO</span>
    </div>
    <div class="op-item" onclick="selOp(this, 'Tim')">
        <img src="https://logodownload.org/wp-content/uploads/2014/05/tim-logo-1.png">
        <span>TIM</span>
    </div>
    <div class="op-item" onclick="selOp(this, 'Claro')">
        <img src="https://logodownload.org/wp-content/uploads/2014/02/claro-logo-1.png">
        <span>CLARO</span>
    </div>
    <div class="op-item" onclick="selOp(this, 'Oi')">
        <img src="https://logodownload.org/wp-content/uploads/2014/05/oi-logo-1.png">
        <span>OI</span>
    </div>
</div>
        

        <div class="section-title">Valor da Recarga</div>
        <div class="value-grid">
            <div class="v-chip" onclick="selVal(this, 15)">R$ 15</div>
            <div class="v-chip active" onclick="selVal(this, 20)">R$ 20</div>
            <div class="v-chip" onclick="selVal(this, 30)">R$ 30</div>
            <div class="v-chip" onclick="selVal(this, 50)">R$ 50</div>
            <div class="v-chip" onclick="selVal(this, 100)">R$ 100</div>
        </div>
    </div>

    <div class="footer-action">
        <button id="btnFinish" class="btn-pay" onclick="executarRecarga()">Confirmar Pagamento</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userUid = "";
    let saldoAtual = 0;
    let saidaAcumulada = 0;
    let opSelecionada = "";
    let valorSelecionado = 20;

    // Monitor de Auth
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            const snap = await getDoc(doc(db, "usuarios", user.uid));
            if(snap.exists()){
                saldoAtual = Number(snap.data().saldo || 0);
                saidaAcumulada = Number(snap.data().saida || 0);
                document.getElementById('displaySaldo').innerText = saldoAtual.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            }
        } else { location.href='login.html'; }
    });

    // Funções de Seleção
    window.selOp = (el, name) => {
        document.querySelectorAll('.op-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        opSelecionada = name;
    };
    window.selVal = (el, val) => {
        document.querySelectorAll('.v-chip').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        valorSelecionado = val;
    };

    // Processamento Blindado
    window.executarRecarga = async () => {
        const tel = document.getElementById('numTel').value;
        const btn = document.getElementById('btnFinish');

        if(tel.length < 10) return alert("Número inválido");
        if(!opSelecionada) return alert("Selecione a operadora");
        if(valorSelecionado > saldoAtual) return alert("Saldo insuficiente");

        btn.disabled = true;
        btn.innerText = "AUTORIZANDO...";

        try {
            const txId = "REC" + Date.now();
            const dataISO = new Date().toISOString();
            const dataSimples = dataISO.split('T')[0];

            // 1. SALVA TRANSAÇÃO (PRO GRAFICO)
            await setDoc(doc(db, "transacoes", txId), {
                userId: userUid,
                tipo: "saida",
                valor: valorSelecionado,
                descricao: "Recarga " + opSelecionada,
                data: dataSimples, // Formato que o dashboard.js entende
                timestamp: new Date()
            });

            // 2. SALVA LOG DE RECARGA
            await setDoc(doc(db, "recargas", txId), {
                userId: userUid,
                telefone: tel,
                operadora: opSelecionada,
                valor: valorSelecionado,
                data: dataISO,
                status: "Concluído"
            });

            // 3. ATUALIZA SALDO
            await updateDoc(doc(db, "usuarios", userUid), {
                saldo: saldoAtual - valorSelecionado,
                saida: saidaAcumulada + valorSelecionado
            });

            btn.innerText = "SUCESSO!";
            setTimeout(() => { location.href = 'home.html'; }, 1500);
            // Dentro do seu try { ... }
const txId = "REC" + Date.now();
const hoje = new Date();
const dataSimples = hoje.toISOString().split('T')[0]; // Ex: 2026-04-11

// --- ESSE BLOCO FAZ O GRÁFICO APARECER ---
await setDoc(doc(db, "transacoes", txId), {
    userId: userUid,
    tipo: "saida",        // O gráfico procura por 'saida'
    valor: valorSelecionado,
    descricao: "Recarga " + opSelecionada,
    data: dataSimples,    // dashboard.js usa isso para o eixo X
    timestamp: hoje       // extrato usa isso para ordenar
});
            

        } catch (e) {
            console.error(e);
            alert("Erro na rede. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "Confirmar Pagamento";
        }
    };

    // Máscara de telefone
    document.getElementById('numTel').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
        v = v.replace(/(\d)(\d{4})$/,"$1-$2");
        e.target.value = v;
    });
</script>
</body>
</html>
