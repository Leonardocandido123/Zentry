<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>ZENTRY</title>
    <style>
        :root { --primary: #22c55e; --bg: #000; --card: #111827; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .section-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 20px 0 10px; }
        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 10px; }
        .input-box input { background: transparent; border: none; color: #fff; font-size: 18px; width: 100%; }
        
        .op-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .op-item { background: var(--card); border: 2px solid transparent; border-radius: 16px; padding: 12px 5px; text-align: center; cursor: pointer; }
        .op-item img { width: 30px; height: 30px; object-fit: contain; }
        .op-item span { display: block; font-size: 9px; font-weight: 700; color: #9CA3AF; margin-top: 5px; }
        .op-item.active { border-color: var(--primary); background: rgba(34, 197, 94, 0.1); }
        .op-item.active span { color: #fff; }
        
        .value-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .v-chip { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; font-weight: 800; cursor: pointer; }
        .v-chip.active { background: var(--primary); color: #000; border-color: var(--primary); }
        
        .footer-action { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: linear-gradient(transparent, #000 30%); }
        .btn-pay { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--primary); color: #052e16; font-weight: 800; font-size: 16px; box-shadow: 0 10px 20px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>

    <div class="app-bar">
        <div onclick="window.location.href='home.html'" style="padding: 10px; background: var(--card); border-radius: 10px; cursor: pointer;">Voltar</div>
        <div id="displaySaldo" style="color: var(--primary); font-weight: 800;">R$ 0,00</div>
    </div>

    <div class="content">
        <h2 style="margin: 0; font-weight: 800;">Recarga Celular</h2>
        
        <div class="section-title">Número</div>
        <div class="input-box">
            <input type="tel" id="numTel" placeholder="(00) 00000-0000">
        </div>

        <div class="section-title">Operadora</div>
        <div class="op-grid">
            <div class="op-item" onclick="escolherOp(this, 'Vivo')"><img src="https://logodownload.org/wp-content/uploads/2014/04/vivo-logo-1.png"><span>VIVO</span></div>
            <div class="op-item" onclick="escolherOp(this, 'Tim')"><img src="https://logodownload.org/wp-content/uploads/2014/05/tim-logo-1.png"><span>TIM</span></div>
            <div class="op-item" onclick="escolherOp(this, 'Claro')"><img src="https://logodownload.org/wp-content/uploads/2014/02/claro-logo-1.png"><span>CLARO</span></div>
            <div class="op-item" onclick="escolherOp(this, 'Oi')"><img src="https://logodownload.org/wp-content/uploads/2014/05/oi-logo-1.png"><span>OI</span></div>
        </div>

        <div class="section-title">Valor</div>
        <div class="value-grid">
            <div class="v-chip" onclick="escolherVal(this, 15)">R$ 15</div>
            <div class="v-chip active" onclick="escolherVal(this, 20)">R$ 20</div>
            <div class="v-chip" onclick="escolherVal(this, 30)">R$ 30</div>
        </div>
    </div>

    <div class="footer-action">
        <button id="btnFinish" class="btn-pay" onclick="finalizarAgora()">Confirmar</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userUid = "";
    let saldoAtual = 0;
    let operadora = "";
    let valor = 20;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            const snap = await getDoc(doc(db, "usuarios", user.uid));
            if(snap.exists()){
                saldoAtual = Number(snap.data().saldo || 0);
                document.getElementById('displaySaldo').innerText = saldoAtual.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            }
        } else { window.location.href = 'login.html'; }
    });

    window.escolherOp = (el, nome) => {
        document.querySelectorAll('.op-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        operadora = nome;
    };

    window.escolherVal = (el, v) => {
        document.querySelectorAll('.v-chip').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        valor = v;
    };

    window.finalizarAgora = async () => {
        const tel = document.getElementById('numTel').value;
        const btn = document.getElementById('btnFinish');

        if(tel.length < 5) return alert("Digite o número!");
        if(!operadora) return alert("Selecione a operadora!");
        if(valor > saldoAtual) return alert("Saldo insuficiente!");

        btn.disabled = true;
        btn.innerText = "Processando...";
        
        try {
            const txId = "TX" + Date.now();
            const agora = new Date();
            const dataSimples = agora.toISOString().split('T')[0];

            // 1. GRAVA PARA O GRÁFICO (O ÍNDICE QUE VOCÊ CRIOU É PRA ISSO)
            await setDoc(doc(db, "transacoes", txId), {
                userId: userUid,
                tipo: "saida",
                valor: valor,
                data: dataSimples,
                timestamp: agora,
                descricao: "Recarga " + operadora
            });

            // 2. ATUALIZA O SALDO DO USUÁRIO
            await updateDoc(doc(db, "usuarios", userUid), {
                saldo: saldoAtual - valor
            });

            btn.innerText = "SUCESSO!";
            setTimeout(() => { window.location.href = "home.html"; }, 1500);

        } catch(e) {
            console.error(e);
            alert("Erro ao processar recarga.");
            btn.disabled = false;
            btn.innerText = "Confirmar";
        }
    };

    // Máscara de telefone
    document.getElementById('numTel').addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
        v = v.replace(/(\d)(\d{4})$/,"$1-$2");
        e.target.value = v;
    });
</script>
</body>
</html>
