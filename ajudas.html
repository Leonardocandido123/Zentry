<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Suporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #22c55e; 
            --card-bg: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }
        .container { padding: 25px; max-width: 450px; margin: auto; animation: fadeIn 0.4s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-nav {
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; background: var(--card-bg);
            border-radius: 50%; color: #fff; text-decoration: none;
            margin-bottom: 20px; border: 1px solid var(--border);
        }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; color: var(--primary); letter-spacing: -1px; }

        .support-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 30px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .support-card svg { color: var(--primary); margin-bottom: 15px; }
        .support-card h3 { margin: 0 0 10px 0; font-size: 19px; font-weight: 700; }
        .support-card p { font-size: 14px; color: var(--text-sec); margin-bottom: 25px; line-height: 1.5; }
        
        .btn-support {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px; border-radius: 18px;
            background: #fff; color: #000; text-decoration: none;
            font-weight: 800; font-size: 15px; transition: 0.2s;
        }
        .btn-support:active { transform: scale(0.96); opacity: 0.9; }

        .faq-group { display: flex; flex-direction: column; gap: 10px; }
        
        .faq-item {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .faq-item:active { background: rgba(255, 255, 255, 0.1); }
        .faq-item span { font-size: 14px; font-weight: 600; color: #e2e8f0; }
        .faq-item svg { color: var(--border); }
    </style>
</head>
<body onload="carregarNome()">
    <div class="container">
        <a href="perfil.html" class="back-nav">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        
        <h1>Ajuda</h1>

        <div class="support-card">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>Olá, <span id="user-name">Leonardo</span>!</h3>
            <p>Como podemos ajudar você hoje? Nosso time de especialistas está online.</p>
            <a href="https://wa.me/5518997696284" class="btn-support">
                Falar com consultor
            </a>
        </div>

        <div style="margin: 30px 0 15px 5px; font-size: 11px; text-transform: uppercase; color: var(--text-sec); letter-spacing: 1.5px; font-weight: 800;">Dúvidas comuns</div>
        
        <div class="faq-group">
            <div class="faq-item" onclick="verDuvida('Pix')"><span>Esqueci minha senha Pix</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
            <div class="faq-item" onclick="verDuvida('Prazos')"><span>Prazos de transferência</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
            <div class="faq-item" onclick="verDuvida('Taxas')"><span>Taxas e Limites</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // Suas configurações do Firebase (mesmas das outras telas)
    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ESSA É A INTEGRAÇÃO REAL COM O BACKEND
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Busca o nome direto do documento do usuário no Firebase
            const userRef = doc(db, "usuarios", user.uid);
            const userSnap = await getDoc(userRef);

            if (userSnap.exists()) {
                document.getElementById("user-name").innerText = userSnap.data().nome;
            }
        } else {
            // Se o usuário não estiver logado, manda pro login
            window.location.replace("login.html");
        }
    });

    window.verDuvida = (tema) => {
        alert("Exibindo informações sobre: " + tema);
    };
</script>
    
</body>
</html>
