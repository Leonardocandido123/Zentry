<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>ZENTRY - Scanner</title>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
:root { --primary: #22C55E; }

* { box-sizing: border-box; }

body {
  margin: 0;
  background: #000;
  color: white;
  height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

/* SCANNER FULL */
#reader {
  position: fixed;
  inset: 0;
}

#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

/* OVERLAY ESCURO */
.overlay {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

/* ÁREA DE FOCO (BOLETO) */
.focus-area {
  width: 90%;
  height: 140px;
  border-radius: 12px;
  position: relative;
  overflow: hidden;
}

/* LINHA NUBANK */
.scanner-line {
  position: absolute;
  width: 100%;
  height: 3px;
  background: var(--primary);
  box-shadow: 0 0 20px var(--primary);
  animation: scan 2s infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* BOTÃO VOLTAR */
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 10;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  padding: 12px;
  border-radius: 50%;
  backdrop-filter: blur(10px);
}

/* TEXTO */
.tip {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<button class="back-btn" onclick="window.history.back()">
←
</button>

<div id="reader"></div>

<div class="overlay">
  <div class="focus-area">
    <div class="scanner-line"></div>
  </div>
</div>

<div class="tip">Aponte para o código de barras do boleto</div>

<script>
let jaLeu = false;

function startScanner() {
  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.querySelector('#reader'),
      constraints: {
        facingMode: "environment",
        width: { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    locator: {
      patchSize: "medium",
      halfSample: true
    },
    numOfWorkers: 2,
    decoder: {
      readers: [
        "ean_reader",
        "ean_13_reader",
        "code_128_reader",
        "code_39_reader",
        "i2of5_reader"
      ]
    },
    locate: true
  }, function(err) {
    if (err) {
      console.error(err);
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result) {
    if (jaLeu) return;

    const code = result.codeResult.code;

    if (!code || code.length < 10) return;

    jaLeu = true;

    if (navigator.vibrate) navigator.vibrate(200);

    Quagga.stop();

    if (code.length === 44) {
      processarBoleto(code);
    } else {
      alert("Código: " + code);

      setTimeout(() => {
        jaLeu = false;
        Quagga.start();
      }, 2000);
    }
  });
}

/* FORMATAR BOLETO */
function converterLinhaDigitavel(codigo) {
  return `${codigo.slice(0,5)}.${codigo.slice(5,10)} ` +
         `${codigo.slice(10,15)}.${codigo.slice(15,21)} ` +
         `${codigo.slice(21,26)}.${codigo.slice(26,32)} ` +
         `${codigo.slice(32,33)} ` +
         `${codigo.slice(33)}`;
}

/* PROCESSAR */
function processarBoleto(codigo) {

  const linha = converterLinhaDigitavel(codigo);
  const valor = parseInt(codigo.slice(37)) / 100;

  const fator = parseInt(codigo.slice(33, 37));
  let base = new Date(1997, 9, 7);
  let vencimento = new Date(base.getTime() + fator * 86400000);

  const boleto = {
    codigo,
    linha,
    valor: valor.toFixed(2),
    vencimento: vencimento.toLocaleDateString()
  };

  localStorage.setItem("boletoAtual", JSON.stringify(boleto));

  // TRANSIÇÃO SUAVE
  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "pagamento.html";
  }, 300);
}

window.onload = startScanner;
</script>

</body>
</html>
