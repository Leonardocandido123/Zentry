<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRY - Scanner</title>

<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
:root { --primary: #22C55E; }

body {
  margin: 0;
  background: #000;
  color: white;
  height: 100vh;
  overflow: hidden;
  font-family: 'Inter', sans-serif;
}

/* VIDEO FULL */
#reader {
  position: fixed;
  inset: 0;
}

#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: cover;
}

/* OVERLAY */
.overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}

.overlay::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.4);
}

/* FOCO */
.focus-area {
  width: 90%;
  height: 120px;
  border: 2px solid var(--primary);
  border-radius: 12px;
  position: relative;
  z-index: 2;
  overflow: hidden;
}

/* LINHA */
.scanner-line {
  position: absolute;
  width: 100%;
  height: 3px;
  background: var(--primary);
  box-shadow: 0 0 15px var(--primary);
  animation: scan 1.8s infinite;
}

@keyframes scan {
  0% { top: 0; }
  100% { top: 100%; }
}

/* BOTÃO */
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 10;
  background: rgba(255,255,255,0.1);
  border: none;
  color: white;
  padding: 12px;
  border-radius: 50%;
}

/* TEXTO */
.tip {
  position: absolute;
  bottom: 40px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  opacity: 0.8;
}
</style>
</head>

<body>

<button class="back-btn" onclick="window.history.back()">←</button>

<div id="reader"></div>

<div class="overlay">
  <div class="focus-area">
    <div class="scanner-line"></div>
  </div>
</div>

<div class="tip">Aponte para o código de barras</div>

<script>
let jaLeu = false;

/* =========================
   🔢 VALIDAÇÃO REAL BOLETO
========================= */

// remove tudo que não for número
function apenasNumeros(str){
  return str.replace(/\D/g, '');
}

// módulo 10
function modulo10(numero) {
  let soma = 0;
  let peso = 2;

  for (let i = numero.length - 1; i >= 0; i--) {
    let calc = numero[i] * peso;
    if (calc >= 10) calc = 1 + (calc - 10);
    soma += calc;
    peso = peso === 2 ? 1 : 2;
  }

  return (10 - (soma % 10)) % 10;
}

// módulo 11
function modulo11(numero) {
  let soma = 0;
  let peso = 2;

  for (let i = numero.length - 1; i >= 0; i--) {
    soma += numero[i] * peso;
    peso = peso === 9 ? 2 : peso + 1;
  }

  let resto = soma % 11;

  if (resto === 0 || resto === 1) return 0;
  if (resto === 10) return 1;

  return 11 - resto;
}

// converter linha → código
function linhaParaCodigo(linha) {
  return (
    linha.slice(0,4) +
    linha.slice(32,33) +
    linha.slice(33,47) +
    linha.slice(4,9) +
    linha.slice(10,20) +
    linha.slice(21,31)
  );
}

// validar linha digitável
function validarLinhaDigitavel(linha) {
  linha = apenasNumeros(linha);

  if (linha.length !== 47) return false;

  const bloco1 = linha.slice(0,9);
  const dv1 = linha[9];

  const bloco2 = linha.slice(10,20);
  const dv2 = linha[20];

  const bloco3 = linha.slice(21,31);
  const dv3 = linha[31];

  if (modulo10(bloco1) != dv1) return false;
  if (modulo10(bloco2) != dv2) return false;
  if (modulo10(bloco3) != dv3) return false;

  const codigo = linhaParaCodigo(linha);
  const dvGeral = codigo[4];
  const semDV = codigo.slice(0,4) + codigo.slice(5);

  if (modulo11(semDV) != dvGeral) return false;

  return codigo;
}

/* =========================
   🏦 IDENTIFICAR BANCO
========================= */

function identificarBanco(codigo) {
  const banco = codigo.slice(0,3);

  const bancos = {
    "001": "Banco do Brasil",
    "237": "Bradesco",
    "341": "Itaú",
    "033": "Santander",
    "104": "Caixa",
    "260": "Nubank",
    "077": "Inter"
  };

  return bancos[banco] || "Banco desconhecido";
}

/* =========================
   📷 SCANNER
========================= */

function startScanner() {
  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.querySelector('#reader'),
      constraints: {
        facingMode: "environment",
        focusMode: "continuous"
      },
      area: {
        top: "40%",
        right: "5%",
        left: "5%",
        bottom: "40%"
      }
    },

    locator: {
      patchSize: "large",
      halfSample: false
    },

    numOfWorkers: navigator.hardwareConcurrency || 4,

    decoder: {
      readers: [
        "i2of5_reader",
        "code_128_reader",
        "ean_reader",
        "ean_13_reader"
      ]
    },

    locate: true
  }, function(err) {
    if (err) {
      console.error("Erro:", err);
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result) {
    if (jaLeu) return;

    let code = result.codeResult.code;

    if (!code || code.length < 20) return;

    jaLeu = true;

    if (navigator.vibrate) navigator.vibrate(200);

    Quagga.stop();

    code = apenasNumeros(code);

    // se vier como linha digitável
    if (code.length === 47) {
      const convertido = validarLinhaDigitavel(code);

      if (!convertido) {
        alert("❌ Boleto inválido");
        jaLeu = false;
        Quagga.start();
        return;
      }

      processarBoleto(convertido);
    }

    // se já vier código de barras
    else if (code.length === 44) {
      processarBoleto(code);
    }

    else {
      alert("Código inválido");

      setTimeout(() => {
        jaLeu = false;
        Quagga.start();
      }, 2000);
    }
  });
}

/* =========================
   💳 PROCESSAR BOLETO
========================= */

function processarBoleto(codigo) {

  const banco = identificarBanco(codigo);

  const valor = parseInt(codigo.slice(37)) / 100;

  const fator = parseInt(codigo.slice(33, 37));
  let base = new Date(1997, 9, 7);
  let vencimento = new Date(base.getTime() + fator * 86400000);

  const boleto = {
    codigo,
    linha: codigo,
    banco,
    valor: valor.toFixed(2),
    vencimento: vencimento.toLocaleDateString()
  };

  localStorage.setItem("boletoAtual", JSON.stringify(boleto));

  document.body.style.opacity = "0";

  setTimeout(() => {
    window.location.href = "pagamento.html";
  }, 300);
}

window.onload = startScanner;
</script>

</body>
</html>
