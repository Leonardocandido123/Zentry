<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECH Pay  - Recuperar Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22C55E; --bg: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 25px;
            color: white;
        }

        .header {
            display: flex;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 40px;
        }
        
        .back-btn { background: none; border: none; cursor: pointer; color: white; margin-right: 15px; }
        .back-btn svg { width: 24px; height: 24px; stroke-width: 2; fill: none; stroke: currentColor; }

        .question-area { flex-grow: 1; }
        .question-area h2 { font-size: 26px; font-weight: 500; line-height: 1.3; margin-bottom: 15px; }
        .question-area p { color: #9CA3AF; font-size: 15px; line-height: 1.5; }

        .input-group { position: relative; margin-top: 50px; border-bottom: 1px solid #2A3441; }
        .input-line {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px 0;
            color: white;
            font-size: 20px;
            outline: none;
        }

        .footer {
            display: flex;
            justify-content: flex-end;
            padding: 20px 0 40px 0;
        }

        .next-btn {
            width: 60px; height: 60px;
            background: #1F2937;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            border: none; transition: 0.3s;
        }

        .next-btn svg { width: 28px; height: 28px; stroke: #4B5563; stroke-width: 2.5; fill: none; }
        .next-btn.active { background: var(--primary); box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .next-btn.active svg { stroke: #000000; }
    </style>
</head>
<body>

    <div class="header">
        <button class="back-btn" onclick="location.href='login.html'">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
    </div>

    <div class="question-area">
        <h2>Esqueceu sua senha?</h2>
        <p>Não se preocupe! Informe seu CPF para validarmos sua identidade.</p>
        
        <div class="input-group">
            <input type="text" id="cpfRecover" class="input-line" placeholder="000.000.000-00" inputmode="numeric" maxlength="14">
        </div>
    </div>

    <div class="footer">
        <button class="next-btn" id="nextBtn" onclick="enviarCodigo()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
    </div>

   <script>
    const cpfInput = document.getElementById('cpfRecover');
    const nextBtn = document.getElementById('nextBtn');

    cpfInput.addEventListener('input', (e) => {
        let value = e.target.value.replace(/\D/g, "");
        if (value.length <= 11) {
            value = value.replace(/(\d{3})(\d)/, "$1.$2");
            value = value.replace(/(\d{3})(\d)/, "$1.$2");
            value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        }
        e.target.value = value;

        if (value.length === 14) {
            nextBtn.classList.add('active');
        } else {
            nextBtn.classList.remove('active');
        }
    });

    // UMA ÚNICA FUNÇÃO COM TODA A LÓGICA UNIDA
    function enviarCodigo() {
        if(!nextBtn.classList.contains('active')) return;

        const cpfDigitado = cpfInput.value;
        const cpfSalvo = localStorage.getItem("usuarioCPF");

        // 1. Verifica se o CPF existe no "banco"
        if(cpfDigitado === cpfSalvo) {
            // 2. Marca o fluxo como recuperação para a tela de token saber para onde ir
            localStorage.setItem("fluxoAtual", "recuperacao");
            
            alert("Identidade confirmada! Enviamos um código para seu celular.");
            window.location.href = "cadastro_token.html";
        } else {
            alert("CPF não encontrado em nossa base de dados. Verifique os números.");
        }
    }
</script>

</body>
</html>
