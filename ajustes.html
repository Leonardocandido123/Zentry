<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Ajustes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #22c55e; 
            --bg-dark: #000000;
            --card-bg: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }

        .container { padding: 25px; max-width: 450px; margin: auto; }

        .back-nav {
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; background: var(--card-bg);
            border-radius: 50%; color: #fff; text-decoration: none;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; color: var(--primary); }

        .section-title {
            font-size: 11px; color: var(--text-sec);
            text-transform: uppercase; letter-spacing: 1.5px;
            margin: 25px 0 12px 5px; font-weight: 700;
        }

        .menu-group {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border-radius: 24px; border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 10px;
        }

        .menu-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; border-bottom: 1px solid var(--border);
            text-decoration: none; color: inherit;
        }

        .menu-item:last-child { border: none; }
        .menu-item:active { background: rgba(255,255,255,0.02); }

        .item-label b { font-size: 15px; font-weight: 600; display: block; }
        .item-label span { font-size: 11px; color: var(--text-sec); }

        .toggle {
            width: 48px; height: 26px; background: #334155;
            border-radius: 20px; position: relative;
            transition: 0.3s; cursor: pointer;
        }
        .toggle.active { background: var(--primary); }
        .toggle::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            background: #fff; border-radius: 50%; top: 3px; left: 3px;
            transition: 0.3s;
        }
        .toggle.active::after { left: 25px; }

        .chevron { color: var(--text-sec); opacity: 0.5; }
    </style>
</head>
<body>

<div class="container">
    <a href="perfil.html" class="back-nav">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    </a>

    <h1>Ajustes</h1>

    <div class="section-title">Segurança</div>
    <div class="menu-group">
        <div class="menu-item">
            <div class="item-label">
                <b>Face ID / Digital</b>
                <span>Acessar app com biometria</span>
            </div>
            <div class="toggle" id="toggle-biometria" onclick="handleToggle('toggle-biometria')"></div>
        </div>
        <div class="menu-item">
            <div class="item-label">
                <b>Ocultar Saldo</b>
                <span>Saldo oculto ao abrir o app</span>
            </div>
            <div class="toggle" id="toggle-saldo" onclick="handleToggle('toggle-saldo')"></div>
        </div>
    </div>

    <div class="section-title">Documentos Legais</div>
    <div class="menu-group">
        <a href="termos.html" class="menu-item">
            <div class="item-label">
                <b>Termos de Uso</b>
                <span>Regras de utilização do app</span>
            </div>
            <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </a>
        <a href="privacidade.html" class="menu-item">
            <div class="item-label">
                <b>Política de Privacidade</b>
                <span>Como cuidamos dos seus dados</span>
            </div>
            <svg class="chevron" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </a>
    </div>

</div>

<script>
    const ajustesKeys = ['toggle-biometria', 'toggle-saldo'];

    function carregarAjustes() {
        ajustesKeys.forEach(key => {
            const status = localStorage.getItem(key);
            const elemento = document.getElementById(key);
            if (status === 'true') { elemento.classList.add('active'); }
        });
    }

    function handleToggle(id) {
        const elemento = document.getElementById(id);
        elemento.classList.toggle('active');
        const estaAtivo = elemento.classList.contains('active');
        localStorage.setItem(id, estaAtivo);
    }

    window.onload = carregarAjustes;
</script>

</body>
</html>
