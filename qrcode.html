<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Qrcode</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Inter;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header{
  text-align:center;
  padding:18px;
  font-weight:700;
  border-bottom:1px solid #222;
}

#reader{
  width:100%;
  max-width:420px;
  margin:auto;
  margin-top:20px;
  border-radius:18px;
  overflow:hidden;
}

.status{
  text-align:center;
  color:#22C55E;
  font-size:13px;
  margin:15px;
}

button{
  width:90%;
  margin:20px auto;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22C55E;
  color:#000;
  font-weight:700;
}
</style>
</head>

<body>

<div class="header">Qrcode</div>

<div id="reader"></div>

<div class="status" id="status">Preparando câmera...</div>

<button onclick="reiniciar()">Reiniciar</button>

<script>
let scanner;
let ativo = false;

/* 🔥 1. PERMISSÃO FORÇADA (ANDROID 15 SAFE) */
async function pedirPermissao(){
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
    stream.getTracks().forEach(t => t.stop());
    return true;
  } catch (e) {
    alert("Permissão da câmera negada");
    return false;
  }
}

/* 🔥 2. INICIAR SCANNER SEGURO */
async function iniciarScanner(){
  if (ativo) return;
  ativo = true;

  try {

    document.getElementById("status").innerText = "Abrindo câmera...";

    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      document.getElementById("status").innerText = "Nenhuma câmera encontrada";
      ativo = false;
      return;
    }

    // 🔥 força câmera traseira real
    let cameraId = cameras[0].id;
    const backCam = cameras.find(c => c.label.toLowerCase().includes("back"));
    if (backCam) cameraId = backCam.id;

    await scanner.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      async (text) => {

        try {
          navigator.vibrate?.(80);

          await scanner.stop();
          ativo = false;

          document.getElementById("status").innerText = "QR detectado";

          processarQR(text);

        } catch (e) {
          console.log(e);
        }

      }
    );

    document.getElementById("status").innerText = "Aponte para o QR Code";

  } catch (err) {
    console.log(err);
    document.getElementById("status").innerText =
      "Erro na câmera (WebView bloqueou)";
    ativo = false;
  }
}

/* 🔥 3. PROCESSAMENTO SEGURO */
function processarQR(text){
  try {
    localStorage.setItem("qr_raw", text);
    window.location.href = "confirmar.html";
  } catch (e) {
    alert("QR inválido");
    location.reload();
  }
}

/* 🔥 4. RESTART LIMPO */
function reiniciar(){
  location.reload();
}

/* 🔥 START SEGURO ANDROID 15 */
window.addEventListener("load", async () => {
  const ok = await pedirPermissao();
  if (!ok) return;

  setTimeout(iniciarScanner, 800);
});
</script>

</body>
</html>
