<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentry - Qrcode</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  runTransaction,
  updateDoc,
  increment
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let qrAtual = null;

// 🔥 SCANNER
async function startScanner() {
  const scanner = new Html5Qrcode("reader");
  const devices = await Html5Qrcode.getCameras();

  const backCam =
    devices.find(d => d.label.toLowerCase().includes("back"))?.id
    || devices[0].id;

  scanner.start(
    { deviceId: { exact: backCam } },
    { fps: 10, qrbox: 250 },

    async (text) => {
      try {
        const data = JSON.parse(text);

        await scanner.stop();

        await processarQR(data);

      } catch {
        alert("QR inválido");
      }
    }
  );
}

// 🔥 NÚCLEO BANCO 3.0
async function processarQR(data) {

  const qrRef = doc(db, "pix_qr", data.id);
  const qrSnap = await getDoc(qrRef);

  if (!qrSnap.exists()) {
    alert("QR não existe");
    return;
  }

  const qr = qrSnap.data();

  // ❌ expirado
  if (qr.status !== "ativo") {
    alert("QR já utilizado ou expirado");
    return;
  }

  if (Date.now() > qr.expiraEm) {
    alert("QR expirado");
    return;
  }

  document.getElementById("nome").innerText = qr.nome || "Destino";
  document.getElementById("valor").innerText = qr.valor;

  qrAtual = qr;
  document.getElementById("scan").style.display = "none";
  document.getElementById("confirm").style.display = "block";
}

// 🔥 TRANSAÇÃO ATÔMICA (BANCO REAL)
window.pagar = async () => {
  const uid = localStorage.getItem("userLogado");
  if (!uid || !qrAtual) return;

  const userRef = doc(db, "usuarios", uid);
  const qrRef = doc(db, "pix_qr", qrAtual.id);

  await runTransaction(db, async (tx) => {

    const userSnap = await tx.get(userRef);
    const qrSnap = await tx.get(qrRef);

    if (!userSnap.exists() || !qrSnap.exists()) throw "erro";

    const saldo = userSnap.data().saldo || 0;

    if (saldo < qrSnap.data().valor) {
      throw "saldo insuficiente";
    }

    if (qrSnap.data().status !== "ativo") {
      throw "QR já usado";
    }

    // 🔒 bloqueio imediato
    tx.update(qrRef, { status: "usado" });

    tx.update(userRef, {
      saldo: increment(-qrSnap.data().valor)
    });
  });

  alert("Pagamento aprovado");
  location.href = "home.html";
};

window.startScanner = startScanner;
</script>

<style>
body { margin:0; background:#000; color:#fff; font-family:Inter; text-align:center; }
#reader { width:100%; max-width:420px; margin:auto; }
.box { background:#111827; margin:20px; padding:20px; border-radius:20px; }
button { width:90%; padding:15px; border:none; border-radius:12px; margin-top:10px; }
.green { background:#22C55E; color:#fff; }
.gray { background:#374151; color:#fff; }
</style>
</head>

<body onload="startScanner()">

<div id="scan">
  <h3>Qrcode</h3>
  <div id="reader"></div>
</div>

<div id="confirm" style="display:none;">
  <div class="box">
    <p>Destino: <span id="nome"></span></p>
    <p>Valor: R$ <span id="valor"></span></p>
  </div>

  <button class="green" onclick="pagar()">Confirmar pagamento</button>
  <button class="gray" onclick="location.reload()">Cancelar</button>
</div>

</body>
</html>
