<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRY - Pagar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
:root { --primary:#22C55E; --bg:#000; --card:#121826; --border:#2A3441; }

* { box-sizing:border-box; font-family:'Inter'; }

body {
  margin:0;
  background:var(--bg);
  color:white;
}

/* HEADER */
.header {
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn {
  background:var(--card);
  border:none;
  padding:10px;
  border-radius:50%;
  color:white;
}

/* SCANNER */
.scanner-container {
  height:280px;
  margin:20px;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border);
}

#reader {
  width:100%;
  height:100%;
}

#reader video {
  object-fit:cover;
}

/* LINHA */
.scan-line {
  position:absolute;
  width:90%;
  height:3px;
  background:var(--primary);
  box-shadow:0 0 20px var(--primary);
  animation:scan 2s infinite;
}

@keyframes scan {
  0% { top:10%; }
  100% { top:90%; }
}

/* TEXTO */
.status {
  text-align:center;
  color:var(--primary);
  font-size:13px;
}

/* BOTÃO */
.option {
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pagar</h2>
</div>

<div class="scanner-container">
  <div id="reader"></div>
  <div class="scan-line"></div>
</div>

<div class="status" id="status">Aponte para QR Code ou Código de Barras</div>

<div class="option" onclick="modoManual()">
  Digitar código manualmente
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// Lembre-se de conferir se sua apiKey e projectId estão batendo com o novo projeto!
const firebaseConfig = {
  apiKey: "AIzaSy...", 
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275",
  storageBucket: "zentry-app-74275.appspot.com",
  messagingSenderId: "571422826071",
  appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userLogado = null;
let qrScanner = null;
let jaLeu = false;
let cameraIniciada = false;

/* =========================
   🛡️ LOGIN COM PROTEÇÃO (DELAY)
========================= */
onAuthStateChanged(auth, (user) => {
  if (user) {
    console.log("Usuário autenticado:", user.uid);
    userLogado = user;
    
    // Pequeno delay para garantir que o DOM carregou antes de abrir a câmera
    setTimeout(() => {
        if(!cameraIniciada) iniciarQR();
    }, 500);
    
  } else {
    // Só redireciona se após 2 segundos o Firebase confirmar que não há ninguém
    setTimeout(() => {
        if (!auth.currentUser) {
            console.warn("Nenhum usuário detectado, redirecionando...");
            location.href = "login.html";
        }
    }, 2000);
  }
});

/* =========================
   🔳 QR CODE (MELHORADO)
========================= */
async function iniciarQR(){
  if(cameraIniciada) return;
  cameraIniciada = true;

  qrScanner = new Html5Qrcode("reader");

  const config = { fps: 10, qrbox: { width: 250, height: 250 } };

  try {
    await qrScanner.start(
      { facingMode: "environment" },
      config,
      (text) => {
        if (jaLeu) return;
        jaLeu = true;
        vibrar();
        qrScanner.stop();
        document.getElementById("status").innerText = "Código detectado! ✔";
        processar(text);
      }
    );
  } catch (err) {
    console.error("Erro ao iniciar QR, tentando Barras...", err);
    cameraIniciada = false;
    iniciarBarras();
  }
}

/* =========================
   📊 CÓDIGO DE BARRAS
========================= */
function iniciarBarras(){
  if(cameraIniciada) return;
  cameraIniciada = true;

  document.getElementById("status").innerText = "Modo código de barras ativo...";

  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.querySelector('#reader'),
      constraints: { facingMode: "environment" }
    },
    decoder: {
      readers: ["i2of5_reader", "code_128_reader", "ean_reader"]
    }
  }, (err) => {
    if (err) {
        console.error(err);
        cameraIniciada = false;
        return;
    }
    Quagga.start();
  });

  Quagga.onDetected((res) => {
    if (jaLeu) return;
    const code = res.codeResult.code;
    if (!code || code.length < 10) return;

    jaLeu = true;
    vibrar();
    Quagga.stop();
    document.getElementById("status").innerText = "Barras detectado! ✔";
    processar(code);
  });
}

/* =========================
   💳 PROCESSAR PAGAMENTO
========================= */
async function processar(codigoLido){
  try {
    let valorPrompt = prompt("Valor do pagamento (Ex: 50,00):");
    if (!valorPrompt) {
        location.reload();
        return;
    }

    const valorNum = parseFloat(valorPrompt.replace(".", "").replace(",", "."));
    
    if (isNaN(valorNum) || valorNum <= 0) {
        alert("Valor inválido!");
        location.reload();
        return;
    }

    document.getElementById("status").innerText = "Verificando saldo...";

    const userRef = doc(db, "usuarios", userLogado.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()) {
        alert("Erro: Perfil de usuário não encontrado no banco!");
        return;
    }

    const saldo = snap.data().saldo || 0;

    if (saldo < valorNum) {
        alert("Saldo insuficiente! Seu saldo: R$ " + saldo.toFixed(2));
        location.reload();
        return;
    }

    document.getElementById("status").innerText = "Processando débito...";

    // Atualiza saldo no Firebase
    await updateDoc(userRef, {
        saldo: increment(-valorNum)
    });

    // Salva transação local para o comprovante
    localStorage.setItem("transacao", JSON.stringify({
        valor: valorNum,
        codigo: codigoLido,
        data: new Date().toLocaleString(),
        tipo: "Pagamento"
    }));

    location.href = "comprovante.html";

  } catch (error) {
    console.error("Erro no processamento:", error);
    alert("Ocorreu um erro ao processar o pagamento.");
    location.reload();
  }
}

/* =========================
   🧠 AUXILIARES
========================= */
function vibrar(){
  if (navigator.vibrate) navigator.vibrate(150);
}

window.modoManual = function(){
  processar("MANUAL");
}
</script>
  
</body>
</html>
