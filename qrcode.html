
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<title>Qrcode</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Inter;
  display:flex;
  flex-direction:column;
  height:100vh;
}

.header{
  padding:18px;
  font-weight:700;
  font-size:18px;
  text-align:center;
  border-bottom:1px solid #222;
}

#reader{
  width:100%;
  max-width:420px;
  margin:auto;
  margin-top:20px;
  border-radius:20px;
  overflow:hidden;
}

.status{
  text-align:center;
  color:#22C55E;
  font-size:13px;
  margin-top:15px;
}

button{
  width:90%;
  margin:20px auto;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#22C55E;
  color:#000;
  font-weight:700;
}
</style>
</head>

<body>

<div class="header">Qrcode Scanner</div>

<div id="reader"></div>

<div class="status" id="status">Iniciando câmera...</div>

<button onclick="reiniciar()">Reiniciar Scanner</button>

<script>
let scanner = null;
let ativo = false;

async function iniciarScanner() {
  try {

    if (ativo) return;
    ativo = true;

    document.getElementById("status").innerText = "Solicitando câmera...";

    scanner = new Html5Qrcode("reader");

    const cameras = await Html5Qrcode.getCameras();

    if (!cameras || cameras.length === 0) {
      document.getElementById("status").innerText = "Nenhuma câmera encontrada";
      ativo = false;
      return;
    }

    // força traseira
    let cameraId = cameras[0].id;
    const back = cameras.find(c => c.label.toLowerCase().includes("back"));
    if (back) cameraId = back.id;

    document.getElementById("status").innerText = "Aponte para o QR Code";

    await scanner.start(
      cameraId,
      {
        fps: 10,
        qrbox: 250
      },
      async (decodedText) => {

        try {
          navigator.vibrate?.(80);

          await scanner.stop();
          ativo = false;

          document.getElementById("status").innerText = "QR detectado";

          processarQR(decodedText);

        } catch (e) {
          console.log("erro scan:", e);
        }

      },
      (error) => {
        // ignora erros de frame
      }
    );

  } catch (err) {
    console.log(err);
    document.getElementById("status").innerText =
      "Erro na câmera (permissão ou WebView)";
    ativo = false;
  }
}

// evita crash APK
function processarQR(texto) {
  try {
    console.log("QR:", texto);

    // aqui você manda pra próxima tela
    localStorage.setItem("qr_raw", texto);

    window.location.href = "confirmar.html";

  } catch (e) {
    alert("QR inválido");
    location.reload();
  }
}

function reiniciar(){
  location.reload();
}

window.addEventListener("load", () => {
  setTimeout(iniciarScanner, 800);
});
</script>

</body>
</html>
