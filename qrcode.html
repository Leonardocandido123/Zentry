<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento QR</title>

<style>
body {
  background:#000;
  color:#fff;
  font-family:Arial;
  padding:20px;
}

.box {
  background:#111;
  padding:20px;
  border-radius:15px;
}
button {
  margin-top:20px;
  padding:15px;
  background:#22C55E;
  border:none;
  border-radius:10px;
  font-weight:bold;
}
</style>
</head>

<body>

<h2>Confirmar pagamento</h2>

<div class="box">
  <p>Nome: <span id="nome"></span></p>
  <p>Valor: R$ <span id="valor"></span></p>
</div>

<button onclick="pagar()">Pagar</button>

<script>
const dados = JSON.parse(localStorage.getItem("pixData"));

if (!dados) {
  alert("Nenhum QR encontrado");
}

document.getElementById("nome").innerText = dados.nome;
document.getElementById("valor").innerText = dados.valor;

function pagar() {

  const comprovante = {
    ...dados,
    data: new Date().toLocaleString()
  };

  localStorage.setItem("comprovante", JSON.stringify(comprovante));

  window.location.href = "comprovante.html";
}
</script>

</body>
</html>
