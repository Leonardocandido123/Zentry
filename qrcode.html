<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRY - Pagar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>
:root { --primary:#22C55E; --bg:#000; --card:#121826; --border:#2A3441; }

* { box-sizing:border-box; font-family:'Inter'; }

body {
  margin:0;
  background:var(--bg);
  color:white;
}

/* HEADER */
.header {
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn {
  background:var(--card);
  border:none;
  padding:10px;
  border-radius:50%;
  color:white;
}

/* SCANNER */
.scanner-container {
  height:280px;
  margin:20px;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border);
}

#reader {
  width:100%;
  height:100%;
}

#reader video {
  object-fit:cover;
}

/* LINHA */
.scan-line {
  position:absolute;
  width:90%;
  height:3px;
  background:var(--primary);
  box-shadow:0 0 20px var(--primary);
  animation:scan 2s infinite;
}

@keyframes scan {
  0% { top:10%; }
  100% { top:90%; }
}

/* TEXTO */
.status {
  text-align:center;
  color:var(--primary);
  font-size:13px;
}

/* BOTÃO */
.option {
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pagar</h2>
</div>

<div class="scanner-container">
  <div id="reader"></div>
  <div class="scan-line"></div>
</div>

<div class="status" id="status">Aponte para QR Code ou Código de Barras</div>

<div class="option" onclick="modoManual()">
  Digitar código manualmente
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userLogado = null;
let qrScanner = null;
let jaLeu = false;

/* LOGIN */
onAuthStateChanged(auth, (user)=>{
  if(user){
    userLogado = user;
    iniciarQR();
  } else {
    location.href="login.html";
  }
});

/* =========================
   🔳 QR CODE
========================= */
function iniciarQR(){
  qrScanner = new Html5Qrcode("reader");

  qrScanner.start(
    { facingMode:"environment" },
    { fps:10, qrbox:250 },
    (text)=>{
      if(jaLeu) return;
      jaLeu = true;

      vibrar();
      qrScanner.stop();

      document.getElementById("status").innerText = "QR detectado ✔";

      processar(text);
    }
  ).catch(()=>{
    iniciarBarras();
  });

  // fallback automático depois de 3s
  setTimeout(()=>{
    if(!jaLeu) iniciarBarras();
  },3000);
}

/* =========================
   📊 CÓDIGO DE BARRAS
========================= */
function iniciarBarras(){

  document.getElementById("status").innerText = "Modo código de barras...";

  Quagga.init({
    inputStream:{
      type:"LiveStream",
      target:document.querySelector('#reader'),
      constraints:{ facingMode:"environment" }
    },
    decoder:{
      readers:[
        "i2of5_reader",
        "code_128_reader",
        "ean_reader"
      ]
    }
  },(err)=>{
    if(err) return console.error(err);
    Quagga.start();
  });

  Quagga.onDetected((res)=>{
    if(jaLeu) return;

    const code = res.codeResult.code;

    if(!code || code.length < 20) return;

    jaLeu = true;

    vibrar();
    Quagga.stop();

    document.getElementById("status").innerText = "Código detectado ✔";

    processar(code);
  });
}

/* =========================
   💳 PROCESSAR
========================= */
async function processar(valor){

  let valorNum = prompt("Digite o valor:");
  if(!valorNum) location.reload();

  valorNum = parseFloat(valorNum.replace(",","."));

  const userRef = doc(db,"usuarios",userLogado.uid);
  const snap = await getDoc(userRef);

  const saldo = snap.data().saldo || 0;

  if(saldo < valorNum){
    alert("Saldo insuficiente");
    location.reload();
    return;
  }

  document.getElementById("status").innerText = "Processando pagamento...";

  await updateDoc(userRef,{
    saldo: increment(-valorNum)
  });

  localStorage.setItem("transacao", JSON.stringify({
    valor: valorNum,
    data: new Date().toLocaleString()
  }));

  location.href="comprovante.html";
}

/* =========================
   🧠 FUNÇÕES
========================= */
function vibrar(){
  if(navigator.vibrate) navigator.vibrate(150);
}

window.modoManual = function(){
  processar("manual");
}
</script>

</body>
</html>
