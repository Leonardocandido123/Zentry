<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENTRY - Cadastro CPF</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22C55E; --bg: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 25px;
            color: white;
            overflow: hidden;
        }

        /* BARRA DE PROGRESSO */
        .progress-container { width: 100%; height: 4px; background: #1F2937; border-radius: 10px; margin-top: 20px; }
        .progress-bar { width: 33%; height: 100%; background: var(--primary); border-radius: 10px; transition: 0.5s; }

        .header-area { margin-top: 40px; margin-bottom: 40px; }
        .header-area h2 { font-size: 24px; font-weight: 500; line-height: 1.3; }

        .input-box { flex-grow: 1; width: 100%; }
        
        .input-wrapper {
            position: relative;
            border-bottom: 1px solid #2A3441;
        }

        .input-line {
            width: 100%;
            background: transparent;
            border: none;
            padding: 15px 0;
            color: white;
            font-size: 26px;
            outline: none;
        }

        /* RODAPÉ QUE SOBE COM O TECLADO */
        .footer {
            display: flex;
            justify-content: flex-end;
            padding: 20px 0 40px 0;
        }

        .next-btn {
            width: 60px;
            height: 60px;
            background: #1F2937;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            transition: 0.3s;
        }

        .next-btn svg { width: 28px; height: 28px; stroke: #4B5563; stroke-width: 2.5; fill: none; }
        .next-btn.active { background: var(--primary); box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .next-btn.active svg { stroke: #000000; }
    </style>
</head>
<body>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="header-area">
        <h2>Certo! Agora, informe o seu CPF</h2>
    </div>

    <div class="input-box">
        <div class="input-wrapper">
            <input type="text" 
                   id="cpf" 
                   class="input-line" 
                   placeholder="000.000.000-00" 
                   inputmode="numeric" 
                   maxlength="14"
                   autocomplete="off">
        </div>
    </div>

    <div class="footer">
        <button class="next-btn" id="nextBtn" onclick="avancar()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
    </div>

    <script>
        const cpfInput = document.getElementById('cpf');
        const nextBtn = document.getElementById('nextBtn');

        // MÁSCARA DE CPF
        cpfInput.addEventListener('input', (e) => {
            let value = e.target.value.replace(/\D/g, ""); // Remove tudo que não é número
            
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            }
            
            e.target.value = value;

            // Ativa botão se CPF estiver completo (14 caracteres com pontos/traço)
            if (value.length === 14) {
                nextBtn.classList.add('active');
            } else {
                nextBtn.classList.remove('active');
            }
        });

        // ESCUTA A SETA AZUL DO TECLADO
        cpfInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && cpfInput.value.length === 14) {
                avancar();
            }
        });

        function avancar() {
            if (cpfInput.value.length === 14) {
                localStorage.setItem("usuarioCPF", cpfInput.value);
                window.location.href = "cadastro_contato.html"; // Próxima tela
            }
        }
    </script>
</body>
</html>
