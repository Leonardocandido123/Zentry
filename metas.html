<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta TechPay</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#22c55e;
  --bg:#000;
  --card:#0f172a;
  --border:rgba(255,255,255,0.08);
  --text:#9CA3AF;
}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #0f172a, #000);
  color:#fff;
}

.container { padding:20px; }

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.header h2 {
  font-size:20px;
  font-weight:800;
}

/* CARD PRINCIPAL */
.goal-card {
  background: linear-gradient(145deg,#111827,#020617);
  border-radius:26px;
  padding:22px;
  border:1px solid var(--border);
  margin-bottom:20px;
}

/* NOME */
.goal-name {
  font-size:13px;
  color:var(--text);
}

.goal-value {
  font-size:34px;
  font-weight:800;
  margin:5px 0;
}

/* BARRA */
.bar {
  height:8px;
  background:#1f2937;
  border-radius:20px;
  overflow:hidden;
  margin:15px 0;
}

.fill {
  height:100%;
  width:0%;
  background:var(--primary);
  border-radius:20px;
  transition:1s;
}

/* TEXTO */
.goal-info {
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:var(--text);
}

/* INPUT CARD */
.input-card {
  background:var(--card);
  border-radius:20px;
  padding:16px;
  border:1px solid var(--border);
  margin-bottom:15px;
}

.input-card input {
  width:100%;
  background:none;
  border:none;
  color:#fff;
  font-size:22px;
  font-weight:800;
  outline:none;
}

/* BOTÃO */
.btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:14px;
  font-weight:800;
  margin-top:10px;
}

.primary {
  background:var(--primary);
  color:#000;
}

.secondary {
  background:transparent;
  border:1px solid var(--border);
  color:#fff;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h2>Metas</h2>
</div>

<!-- META -->
<div class="goal-card">
  <div class="goal-name" id="nome">Meu objetivo</div>
  <div class="goal-value" id="valor">R$ 0,00</div>

  <div class="bar">
    <div class="fill" id="barra"></div>
  </div>

  <div class="goal-info">
    <span id="porc">0%</span>
    <span id="restante">Faltam R$ 0,00</span>
  </div>
</div>

<!-- DEPOSITAR -->
<div class="input-card">
  <small>Guardar dinheiro</small>
  <input id="deposito" placeholder="R$ 0,00" oninput="mascara(this)">
  <button class="btn primary" onclick="depositar()">Guardar</button>
</div>

<!-- CONFIG -->
<div class="input-card">
  <small>Definir meta</small>
  <input id="metaTotal" placeholder="R$ 0,00" oninput="mascara(this)">
  <input id="metaNome" placeholder="Nome da meta">
  <button class="btn secondary" onclick="salvar()">Salvar</button>
</div>

</div>

<script>
// máscara
function mascara(i){
 let v=i.value.replace(/\D/g,'');
 v=(v/100).toFixed(2)+'';
 v=v.replace(".",",");
 v=v.replace(/(\d)(\d{3}),/g,"$1.$2,");
 i.value="R$ "+v;
}

// parse
function parse(v){
 return parseFloat(v.replace(/[^\d]/g,''))/100||0;
}

// salvar meta
function salvar(){
 let valor=parse(document.getElementById("metaTotal").value);
 let nome=document.getElementById("metaNome").value;

 localStorage.setItem("meta_valor",valor);
 localStorage.setItem("meta_nome",nome);

 atualizar();
}

// depositar
function depositar(){
 let v=parse(document.getElementById("deposito").value);
 let atual=parseFloat(localStorage.getItem("meta_guardado")||0);

 localStorage.setItem("meta_guardado",atual+v);

 atualizar();
}

// atualizar UI
function atualizar(){
 let nome=localStorage.getItem("meta_nome")||"Meu objetivo";
 let total=parseFloat(localStorage.getItem("meta_valor")||0);
 let guardado=parseFloat(localStorage.getItem("meta_guardado")||0);

 document.getElementById("nome").innerText=nome;
 document.getElementById("valor").innerText=
 guardado.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

 let p= total>0 ? (guardado/total)*100 : 0;

 document.getElementById("barra").style.width=p+"%";
 document.getElementById("porc").innerText=Math.floor(p)+"%";

 let falta=total-guardado;
 document.getElementById("restante").innerText=
 "Faltam "+falta.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

atualizar();
</script>

</body>
</html>
