<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ZENTRY - Meus Limites Pix</title>
  <style>
    :root { --bg: #000; --card: #121826; --border: #2A3441; --accent: #22C55E; --text-sec: #9CA3AF; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; min-height: 100vh; overflow-y: auto; }
    
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; }
    .back-btn svg { stroke: var(--accent); width: 20px; fill: none; stroke-width: 3; }

    .limit-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 25px; margin-bottom: 25px; }
    .limit-value { font-size: 28px; font-weight: 700; color: white; margin-bottom: 20px; display: block; }

    .progress-bg { width: 100%; height: 8px; background: #222; border-radius: 10px; overflow: hidden; }
    .progress-fill { width: 100%; height: 100%; background: var(--accent); border-radius: 10px; transition: 0.5s; }

    .adj-item { background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 20px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .adj-info b { display: block; font-size: 15px; margin-bottom: 4px; }
    .adj-info span { font-size: 12px; color: var(--text-sec); }
    
    .btn-edit { color: var(--accent); font-size: 14px; font-weight: 600; background: rgba(34, 197, 94, 0.1); border: none; padding: 8px 15px; border-radius: 12px; cursor: pointer; }

    /* MODAL BLINDADO */
    #zModalGlobal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px); }
    .z-content { background:#121826; border:1px solid #2A3441; border-radius:28px; width:100%; max-width:340px; padding:25px; text-align:center; }
  </style>
</head>
<body>

  <div id="zModalGlobal">
    <div class="z-content">
      <div id="zIcon" style="font-size:40px; margin-bottom:15px;">⏳</div>
      <h3 id="zTitle" style="margin:0; font-size:18px; color: #fff;">Análise em Curso</h3>
      <p id="zText" style="color:#9CA3AF; font-size:14px; margin: 10px 0 20px; line-height: 1.5;"></p>
      <button onclick="document.getElementById('zModalGlobal').style.display='none'" style="width:100%; padding:15px; border-radius:14px; background:#22C55E; border:none; color:#000; font-weight:700;">Entendido</button>
    </div>
  </div>

  <div class="header">
    <div class="back-btn" onclick="location.href='pix.html'"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div>
    <b style="font-size: 18px;">Meus Limites</b>
  </div>

  <div class="limit-card">
    <span style="color:var(--text-sec); font-size:13px; text-transform: uppercase; font-weight: 600;">Limite Diário Disponível</span>
    <span class="limit-value" id="disp-diario">R$ 0,00</span>
    <div class="progress-bg"><div class="progress-fill" id="bar-diario"></div></div>
  </div>

  <div class="adj-item">
    <div class="adj-info">
      <b>Limite Diurno</b>
      <span id="txt-diurno">Máximo: R$ 0,00</span>
    </div>
    <button class="btn-edit" onclick="pedirAumento()">Ajustar</button>
  </div>

  <div class="adj-item">
    <div class="adj-info">
      <b>Limite Noturno</b>
      <span id="txt-noturno">Das 20h às 06h: R$ 0,00</span>
    </div>
    <button class="btn-edit" onclick="pedirAumento()">Ajustar</button>
  </div>

  <button onclick="location.href='pix.html'" style="width:100%; background:var(--accent); color:#000; border:none; padding:18px; border-radius:16px; font-weight:700; margin-top:30px; cursor: pointer;">Salvar Configurações</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
      authDomain: "zentry-app-74275.firebaseapp.com",
      projectId: "zentry-app-74275",
      storageBucket: "zentry-app-74275.appspot.com",
      messagingSenderId: "571422826071",
      appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
          if (docSnap.exists()) {
            const d = docSnap.data();
            
            // Pega os valores do banco ou define padrão
            const diario = parseFloat(d.limiteDiario || 5000);
            const noturno = parseFloat(d.limiteNoturno || 1000);
            
            // Atualiza na tela
            document.getElementById('disp-diario').innerText = diario.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('txt-diurno').innerText = "Máximo: " + diario.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('txt-noturno').innerText = "Das 20h às 06h: " + noturno.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            // Animação da barra (100% já que é o disponível)
            document.getElementById('bar-diario').style.width = "100%";
          }
        });
      }
    });

    window.pedirAumento = function() {
        document.getElementById('zModalGlobal').style.display = 'flex';
        document.getElementById('zText').innerText = "Por questões de segurança da sua conta, pedidos para alteração de limites Pix levam de 24h a 48h para serem aprovados.";
    }
  </script>
</body>
</html>
