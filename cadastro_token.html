<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TECH Pay - Verificação</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22C55E; --bg: #000000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 25px;
            color: white;
            overflow: hidden;
        }

        /* BARRA DE PROGRESSO - 58% (Entre contato e email) */
        .progress-container { width: 100%; height: 4px; background: #1F2937; border-radius: 10px; margin-top: 20px; }
        .progress-bar { width: 58%; height: 100%; background: var(--primary); border-radius: 10px; }

        .header-area { margin-top: 40px; margin-bottom: 20px; }
        .header-area h2 { font-size: 24px; font-weight: 500; line-height: 1.3; }
        .header-area p { color: #9CA3AF; font-size: 14px; margin-top: 10px; }

        /* QUADRADOS DO TOKEN */
        .token-container {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            margin-top: 40px;
        }

        .token-input {
            width: 45px;
            height: 55px;
            background: #121212;
            border: 1px solid #2A3441;
            border-radius: 12px;
            text-align: center;
            font-size: 24px;
            font-weight: 600;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .token-input:focus { border-color: var(--primary); background: #1a1a1a; }

        .resend-text {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: #9CA3AF;
        }
        .resend-text span { color: var(--primary); font-weight: 600; cursor: pointer; }

        .footer { display: flex; justify-content: flex-end; padding: 20px 0 40px 0; margin-top: auto; }
        
        .next-btn {
            width: 60px; height: 60px; background: #1F2937; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none; transition: 0.3s;
        }
        .next-btn svg { width: 28px; height: 28px; stroke: #4B5563; stroke-width: 2.5; fill: none; }
        .next-btn.active { background: var(--primary); box-shadow: 0 0 20px rgba(34, 197, 94, 0.3); }
        .next-btn.active svg { stroke: #000000; }
    </style>
</head>
<body>

    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>

    <div class="header-area">
        <h2>Verifique seu celular</h2>
        <p id="msgInfo">Enviamos um código de 6 dígitos para o seu número.</p>
    </div>

    <div class="token-container" id="otp-inputs">
        <input type="number" class="token-input" maxlength="1" inputmode="numeric">
        <input type="number" class="token-input" maxlength="1" inputmode="numeric">
        <input type="number" class="token-input" maxlength="1" inputmode="numeric">
        <input type="number" class="token-input" maxlength="1" inputmode="numeric">
        <input type="number" class="token-input" maxlength="1" inputmode="numeric">
        <input type="number" class="token-input" maxlength="1" inputmode="numeric">
    </div>

    <p class="resend-text">Não recebeu? <span>Reenviar em 59s</span></p>

    <div class="footer">
        <button class="next-btn" id="nextBtn" onclick="avancar()">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
    </div>

    <script>
        const inputs = document.querySelectorAll('.token-input');
        const nextBtn = document.getElementById('nextBtn');

        // Lógica de pular para o próximo campo automaticamente
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 1) {
                    e.target.value = e.target.value.slice(0, 1);
                }
                if (e.target.value !== "" && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checarCompleto();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === "Backspace" && e.target.value === "" && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        function checarCompleto() {
            const preenchido = Array.from(inputs).every(input => input.value !== "");
            if (preenchido) {
                nextBtn.classList.add('active');
            } else {
                nextBtn.classList.remove('active');
            }
        }

        function avancar() {
    const fluxo = localStorage.getItem("fluxoAtual");
    if (fluxo === "recuperacao") {
        window.location.href = "nova_senha.html"; // Se for recuperação, vai criar senha nova
    } else {
        window.location.href = "cadastro_email.html"; // Se for cadastro, segue o baile
    }
}
// Recupera o número salvo para mostrar no texto da tela
const tel = localStorage.getItem("usuarioTelefone") || "(00) 00000-0000";
document.getElementById("msgInfo").innerText = `Enviamos um código para ${tel}`;

    </script>
</body>
</html>
