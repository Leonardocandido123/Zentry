<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Home</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>

<div class="container">
  <header class="header">
    <div class="user-info">
      <div class="greeting" id="greeting">Boa tarde,</div>
      <h2 id="nome-usuario">...</h2>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <div onclick="toggleSaldoHome()" id="eye-btn" style="cursor:pointer; color: #FFF;">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <div class="avatar" onclick="location.href='perfil.html'" style="cursor:pointer;">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
  </header>

  <div class="balance-circle" onclick="location.href='extrato.html'">
    <div class="circle">
        <span id="saldo-home">...</span>
        <small>Saldo disponível</small>
    </div>
  </div>

  <div class="resumo-card">
    <div class="resumo-header"><small>Visão Geral</small></div>
    <div class="resumo-footer-compacto">
      <div class="status-item">
        <small>Entrou</small>
        <strong id="resumo-entrada" style="color:#3B82F6">R$ 0,00</strong>
      </div>
      <div class="status-item">
        <small>Saiu</small>
        <strong id="resumo-saida" style="color:#FBBF24">R$ 0,00</strong>
      </div>
      <div class="status-item">
        <small>Lucro</small>
        <strong id="resumo-lucro" style="color:var(--primary)">R$ 0,00</strong>
      </div>
    </div>
  </div>

  <div class="pix-card">
    <div class="pix-info"><b>Pix rápido ⚡</b><br><span style="font-size: 11px; opacity: 0.8;">Receba e envia dinheiro 24h</span></div>
    <a href="pix.html" class="pix-btn">Usar Pix</a>
  </div>

  <section class="actions-grid">
    <a href="extrato.html" class="action-item"><span>Extrato</span></a>
    <a href="cobrar.html" class="action-item"><span>Cobrar</span></a>
    <a href="contas.html" class="action-item"><span>Contas</span></a>
    <a href="cartao.html" class="action-item"><span>Cartão</span></a>
    <a href="recarga.html" class="action-item"><span>Recarga</span></a>
  </section>

  <div class="techtap-card">
    <div class="techtap-info"><b>ZENTAP ⚡</b><br><span>Venda por aproximação</span></div>
    <button onclick="abrirPDV()" class="techtap-btn">Cobrar</button>
  </div>

  <nav class="nav-bar">
    <button class="nav-btn active" onclick="location.href='home.html'">Início</button>
    <button class="nav-btn" onclick="location.href='metas.html'">Metas</button>
    <button class="nav-btn" onclick="logout()">Sair</button>
  </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let saldoOculto = false;
    window.currentSaldo = 0;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    
                    // Atualiza Nome e Saldo
                    document.getElementById("nome-usuario").innerText = (d.nome || "Usuário") + "!";
                    window.currentSaldo = parseFloat(d.saldo || 0);
                    
                    // Atualiza Resumo (Entrada/Saída/Lucro)
                    const format = (v) => parseFloat(v || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    document.getElementById("resumo-entrada").innerText = format(d.entrada);
                    document.getElementById("resumo-saida").innerText = format(d.saida);
                    document.getElementById("resumo-lucro").innerText = format(d.lucro);
                    
                    renderSaldo();
                } else {
                    document.getElementById("nome-usuario").innerText = "ID não configurado!";
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    function renderSaldo() {
        const el = document.getElementById("saldo-home");
        if(el) el.innerText = saldoOculto ? "••••••••" : window.currentSaldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    window.toggleSaldoHome = () => { saldoOculto = !saldoOculto; renderSaldo(); };
    window.logout = () => { signOut(auth).then(() => { window.location.href = 'login.html'; }); };
    window.abrirPDV = () => { window.location.href = 'pdv.html'; };
</script>

</body>
</html>
