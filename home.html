<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Tech Pay - Home Premium</title>
  <style>
    :root { 
        --primary: #22c55e; 
        --bg-card: #111827;
        --border: rgba(255, 255, 255, 0.15); 
        --text-secondary: #9CA3AF; 
    }
    
    body { margin:0; font-family:'Inter',sans-serif; background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%); -webkit-tap-highlight-color: transparent; overflow-x: hidden; color: #fff; }
    .container { padding:20px; padding-bottom:120px; max-width: 450px; margin: auto; }
    
    /* HEADER */
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-top: 10px; }
    .user-info h2 { font-size: 20px; margin: 2px 0 0 0; color: #FFF; font-weight: 700; }
    .avatar { width:42px; height:42px; background: var(--bg-card); border-radius:50%; display:flex; align-items:center; justify-content:center; border: 1px solid var(--border); }
    
    /* SALDO */
    .balance-circle { display: flex; justify-content: center; margin: 30px 0; cursor: pointer; }
    .circle {
        width: 190px; height: 190px; border-radius: 50%;
        border: 4px solid var(--primary); display: flex; flex-direction: column; 
        align-items: center; justify-content: center; background: radial-gradient(circle, #0a0a0a, #000);
        box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
    }
    .circle span { font-size: 24px; font-weight: 800; }

    /* RESUMO */
    .resumo-dia { display:flex; justify-content:space-between; background:var(--bg-card); border:1px solid var(--border); border-radius:20px; padding:15px; margin-bottom:20px; }
    .resumo-dia div { display:flex; flex-direction:column; align-items:center; }
    .resumo-dia span { font-size:10px; color:var(--text-secondary); }

    /* PIX CARD */
    .pix-card { display:flex; justify-content:space-between; align-items:center; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius:20px; padding:16px; margin-bottom:25px; }
    .pix-info b { font-size:14px; color:#fff; }
    .pix-btn { background:#fff; color:#16a34a; padding:8px 14px; border-radius:12px; font-size:12px; font-weight:700; text-decoration:none; }

    /* GRID DE ÍCONES (ABAIXO DO PIX) */
    .actions-grid { 
        display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; 
    }
    .action-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
    .action-icon { 
        width: 62px; height: 62px; background: var(--bg-card); 
        border: 1px solid rgba(255, 255, 255, 0.4); /* BORDA BRANCA VIVA */
        border-radius: 20px; display: flex; align-items: center; justify-content: center; color: #FFF; 
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .action-item span { font-size: 11px; font-weight: 500; color: #FFF; margin-top: 8px; }

    /* ESTEIRA DE CARDS (ABAIXO DOS BOTÕES) */
    .scroll-container {
        display: flex; overflow-x: auto; gap: 15px; margin: 0 -20px 25px -20px; padding: 0 20px;
        scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .scroll-container::-webkit-scrollbar { display: none; }
    .smart-card-h { 
        flex: 0 0 200px; background: var(--bg-card); border: 1px solid var(--border); 
        border-radius: 22px; padding: 18px; position: relative; 
    }

    /* METAS */
    .smart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
    .progress-container { height: 6px; background: #1f2937; border-radius: 10px; margin: 10px 0; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--primary); border-radius: 10px; }

    /* NAV BAR */
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 12px 0 25px; z-index: 1000; }
    .nav-btn { background: none; border: none; color: #9CA3AF; display: flex; flex-direction: column; align-items: center; gap: 4px; font-size: 10px; }
    svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="user-info">
      <div class="greeting">Boa tarde,</div>
      <h2>Leonardo!</h2>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <div onclick="toggleSaldoHome()" id="eye-btn" style="cursor:pointer; color: #FFF;">
        <svg viewBox="0 0 24 24"><path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <div class="avatar" onclick="location.href='perfil.html'" style="cursor:pointer;">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
</div>

  </header>

  <div class="balance-circle" onclick="location.href='extrato.html'">
    <div class="circle">
        <span id="saldo-home">R$ 0,00</span>
        <small>Saldo disponível</small>
    </div>
  </div>
  
  <div class="resumo-dia">
    <div><span>Entrou</span><b id="entrada-dia">R$ 0,00</b></div>
    <div><span>Saiu</span><b id="saida-dia">R$ 0,00</b></div>
    <div><span>Lucro</span><b id="lucro-dia" style="color: var(--primary);">R$ 0,00</b></div>
  </div>

  <div class="pix-card">
    <div class="pix-info"><b>Pix rápido ⚡</b><br><span style="font-size: 11px; opacity: 0.8;">Mande dinheiro agora</span></div>
    <a href="pix.html" class="pix-btn">Usar Pix</a>
  </div>

  <section class="actions-grid">
    <a href="extrato.html" class="action-item">
        <div class="action-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2M9 5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2m-6 9h6m-6 4h6"/></svg></div>
        <span>Extrato</span>
    </a>
    <a href="cobrar.html" class="action-item">
        <div class="action-icon"><svg viewBox="0 0 24 24" stroke="#22c55e" stroke-width="2.5"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
        <span>Cobrar</span>
    </a>
    <a href="contas.html" class="action-item">
        <div class="action-icon"><svg viewBox="0 0 24 24"><path d="M20 12V8H4v4M2 4h20v16H2V4zm2 4h16v10H4V8z"/></svg></div>
        <span>Contas</span>
    </a>
    <a href="cartao.html" class="action-item">
        <div class="action-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
        <span>Cartão</span>
    </a>
    <a href="recarga.html" class="action-item">
        <div class="action-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg></div>
        <span>Recarga</span>
    </a>
    <a href="metas.html" class="action-item">
        <div class="action-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg></div>
        <span>Metas</span>
    </a>
  </section>

  <div class="scroll-container">
    <div class="smart-card-h" style="border-style: dashed; border-color: var(--primary); text-align: center;">
        <div style="font-size: 28px; color: var(--primary);">+</div>
        <b style="font-size: 13px; display: block; margin-top: 5px;">Novo Cliente</b>
    </div>

    <div class="smart-card-h" style="border-color: #ef4444;">
        <span style="font-size: 8px; background: #ef4444; color: white; padding: 2px 6px; border-radius: 6px; position: absolute; top: 15px; right: 15px; font-weight: 800;">VENCIDO</span>
        <b style="font-size: 14px; display: block; margin-top: 5px;">João (Mecânica)</b>
        <p style="font-size: 11px; color: var(--text-secondary); margin: 8px 0;">Pendente: <b>R$ 150,00</b></p>
        <button style="width: 100%; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid #ef4444; border-radius: 10px; font-size: 10px; padding: 6px; font-weight: 700;">Cobrar</button>
    </div>

    <div class="smart-card-h" style="border-color: #f59e0b;">
        <b style="font-size: 14px; display: block; margin-top: 5px;">Conta de Luz</b>
        <p style="font-size: 11px; color: var(--text-secondary); margin: 8px 0;">Vencimento: 05/05/26</p>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span style="color: #f59e0b; font-weight: 700; font-size: 12px;">R$ 240,00</span>
            <button style="background: #f59e0b; color: #000; border: none; border-radius: 8px; font-size: 10px; padding: 5px 10px; font-weight: 700;">Pagar</button>
        </div>
    </div>
  </div>

  <div class="smart-card">
    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
        <span style="font-size: 13px; font-weight: 600; color: var(--text-secondary);">🚀 Meta Mensal</span>
        <b style="color: var(--primary); font-size: 12px;">83%</b>
    </div>
    <div class="progress-container"><div class="progress-bar" style="width: 83%;"></div></div>
  </div>

</div>

<nav class="nav-bar">
  <button class="nav-btn active"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Início</button>
  <button class="nav-btn"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Análise</button>
  <button class="nav-btn"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>Ajustes</button>
  <button class="nav-btn" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sair</button>
</nav>

<script>
let saldoOculto = false;
function atualizarHome() {
    const saldoSalvo = parseFloat(localStorage.getItem("saldo") || "1250.00");
    document.getElementById("saldo-home").innerText = saldoOculto ? "••••••••" : saldoSalvo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function atualizarResumo() {
    const historico = JSON.parse(localStorage.getItem("transacoes")) || [];
    let entrada = 0, saida = 0;
    historico.forEach(tx => {
        let v = typeof tx.valor === 'string' ? parseFloat(tx.valor.replace("R$ ", "").replace(/\./g, "").replace(",", ".")) : tx.valor;
        if (tx.tipo === "entrada") entrada += v;
        if (tx.tipo === "saida" || tx.tipo === "enviado") saida += v;
    });
    document.getElementById("entrada-dia").innerText = entrada.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    document.getElementById("saida-dia").innerText = saida.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    const lucroEl = document.getElementById("lucro-dia");
    lucroEl.innerText = (entrada - saida).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}
function toggleSaldoHome() {
    saldoOculto = !saldoOculto;
    atualizarHome();
}
window.onload = () => { atualizarHome(); atualizarResumo(); };
function logout() { localStorage.setItem('techpay_user', 'false'); window.location.href = 'login.html'; }
</script>
</body>
  </html>
