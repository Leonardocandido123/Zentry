<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
}

#reader {
  width:100%;
}
</style>
</head>

<body>

<h2>Escaneie o QR Code</h2>
<div id="reader"></div>

<script>
const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras().then(devices => {
  if (devices.length) {

    html5QrCode.start(
      devices[0].id,
      { fps: 10, qrbox: 250 },
      (decodedText) => {

        try {
          const dados = JSON.parse(decodedText);

          // 🔥 SALVA DADOS DO QR
          localStorage.setItem("pixData", JSON.stringify(dados));

          window.location.href = "qrcode.html";

        } catch (e) {
          alert("QR inválido");
        }

      }
    );

  }
}).catch(err => {
  alert("Erro câmera: " + err);
});
</script>

</body>
</html>
