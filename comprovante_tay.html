<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprovante Tay</title>
    <style>
        body { background: #000; font-family: 'Courier New', Courier, monospace; padding: 20px; color: #fff; display: flex; flex-direction: column; align-items: center; }
        
        /* CUPOM REALISTA */
        .cupom {
            background: #fff; color: #000; padding: 30px 20px;
            width: 100%; max-width: 320px; position: relative;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        
        .header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 15px; margin-bottom: 15px; }
        .info { font-size: 13px; line-height: 1.6; }
        .total { font-size: 28px; font-weight: 900; text-align: center; border-top: 2px solid #000; border-bottom: 2px solid #000; margin: 15px 0; padding: 10px 0; }
        
        .footer { text-align: center; margin-top: 20px; font-size: 10px; border-top: 1px dashed #000; padding-top: 10px; }
        
        /* BOTÕES */
        .btn-container { width: 100%; max-width: 320px; margin-top: 25px; display: flex; flex-direction: column; gap: 12px; }
        .btn { 
            padding: 18px; border-radius: 15px; border: none; font-weight: 700; 
            font-family: 'Inter', sans-serif; cursor: pointer; font-size: 16px; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-share { background: #fff; color: #000; }
        .btn-done { background: #22c55e; color: #000; }

        /* SERRILHADO EMBAIXO */
        .serrilhado {
            position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px;
            background-image: radial-gradient(circle, transparent 70%, #fff 70%);
            background-size: 15px 15px; background-position: 0 -7px;
        }
    </style>
</head>
<body>

    <div class="cupom" id="comprovanteConteudo">
        <div class="header">
            <b style="font-size: 22px;">TAY PAYMENTS</b><br>
            <small>UP TECH SOLUÇÕES FINANCEIRAS</small>
        </div>

        <div class="info">
            DATA: <span id="data"></span><br>
            HORA: <span id="hora"></span><br>
            ID: <span id="transId"></span><br>
            LOJA: ESTABELECIMENTO PARCEIRO
        </div>

        <div class="total" id="valorFinal">R$ 0,00</div>

        <div class="info">
            MÉTODO: <b id="metodo">---</b><br>
            <span id="parcelaRow" style="display:none;">PARCELAMENTO: <b id="parcelas">1x</b><br></span>
            STATUS: <b style="color: #22c55e;">APROVADO</b>
        </div>

        <div class="footer">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=60x60&data=VALIDO" style="width: 50px; margin-bottom: 5px;"><br>
            AUTENTICAÇÃO BANCÁRIA TAY PRO
        </div>
        <div class="serrilhado"></div>
    </div>

    <div class="btn-container">
        <button class="btn btn-share" onclick="compartilharCupom()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8m-11-8l5-5 5 5m-5-5v11"/></svg>
            Compartilhar Cupom
        </button>
        
        <button class="btn btn-done" onclick="location.href='home.html'">
            Concluir Transação
        </button>
    </div>

    <script>
        // Puxa os dados da maquininha
        const d = JSON.parse(localStorage.getItem('ultimaTransacaoTay') || '{}');
        const agora = new Date();
        
        // Preenche os campos
        document.getElementById('valorFinal').innerText = d.valor || "R$ 0,00";
        document.getElementById('metodo').innerText = d.metodo || "PIX";
        document.getElementById('data').innerText = agora.toLocaleDateString();
        document.getElementById('hora').innerText = agora.toLocaleTimeString();
        document.getElementById('transId').innerText = Math.floor(Math.random() * 99999999);

        if(d.metodo === 'CRÉDITO') {
            document.getElementById('parcelaRow').style.display = 'block';
            document.getElementById('parcelas').innerText = d.parcelas;
        }

        // FUNÇÃO DE COMPARTILHAR REAL
        async function compartilharCupom() {
            const texto = `*Comprovante de Pagamento TAY*\n\n` +
                          `*Valor:* ${d.valor}\n` +
                          `*Método:* ${d.metodo}\n` +
                          `*Data:* ${agora.toLocaleDateString()} às ${agora.toLocaleTimeString()}\n\n` +
                          `Pagamento Processado via UP TECH.`;

            if (navigator.share) {
                try {
                    await navigator.share({
                        title: 'Comprovante Tay Payments',
                        text: texto,
                        // Você pode até mandar a URL do seu site se quiser
                    });
                } catch (err) {
                    console.log("Usuário cancelou ou erro: ", err);
                }
            } else {
                // Caso o navegador seja muito antigo e não suporte share
                alert("Copiado para a área de transferência!");
                navigator.clipboard.writeText(texto);
            }
        }
    </script>
</body>
</html>
