<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENTRY - Redefinir Senha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #22C55E; --bg: #000000; --text-muted: #6B7280; --border: #2A3441; --card: #121826; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px 25px;
            color: white;
            overflow: hidden;
            position: fixed;
            width: 100%;
        }

        .progress-container { width: 100%; height: 4px; background: #1F2937; border-radius: 10px; margin-top: 10px; margin-bottom: 20px; }
        .progress-bar { width: 50%; height: 100%; background: var(--primary); border-radius: 10px; transition: 0.5s; box-shadow: 0 0 10px var(--primary); }

        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { background: none; border: none; cursor: pointer; color: white; margin-right: 15px; display: flex; align-items: center; }
        .back-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; }
        .step-info { font-size: 13px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

        .question-area { flex-grow: 1; }
        .question-area h2 { font-size: 26px; font-weight: 500; line-height: 1.3; margin-bottom: 40px; }

        .input-group { position: relative; border-bottom: 1.5px solid var(--border); margin-bottom: 35px; transition: 0.3s; }
        .input-group:focus-within { border-bottom-color: var(--primary); }
        
        .input-line {
            width: 100%; background: transparent; border: none;
            padding: 15px 0; color: white; font-size: 22px; outline: none;
        }

        .input-label {
            position: absolute; top: 15px; left: 0; font-size: 18px;
            color: #6B7280; pointer-events: none; transition: all 0.3s ease;
        }

        .input-line:focus + .input-label,
        .input-line:not(:placeholder-shown) + .input-label {
            top: -15px; font-size: 12px; color: var(--primary);
        }

        .footer { display: flex; justify-content: flex-end; padding: 20px 0 40px 0; margin-top: auto; }

        .next-btn {
            width: 65px; height: 65px; background: #1F2937; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; border: none; transition: 0.4s;
            opacity: 0.3; pointer-events: none;
        }

        .next-btn svg { width: 30px; height: 30px; stroke: #4B5563; stroke-width: 2.5; fill: none; }
        .next-btn.active { background: var(--primary); box-shadow: 0 0 25px rgba(34, 197, 94, 0.4); cursor: pointer; opacity: 1; pointer-events: all; }
        .next-btn.active svg { stroke: #000000; }

        /* MODAL ZENTRY (BLINDAGEM) */
        #zModalGlobal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(8px); }
        .z-content { background:#121826; border:1px solid #2A3441; border-radius:30px; width:100%; max-width:340px; padding:30px; text-align:center; animation: pop 0.3s ease; }
        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #senhaSection { display: none; }
    </style>
</head>
<body>

    <div id="zModalGlobal">
        <div class="z-content">
            <div id="zIcon" style="font-size:45px; margin-bottom:15px;">📧</div>
            <h3 id="zTitle" style="margin-bottom:10px; font-size:18px;">Verifique seu E-mail</h3>
            <p id="zText" style="color:#9CA3AF; font-size:14px; margin-bottom:25px; line-height:1.5;"></p>
            <button id="zBtnClose" style="width:100%; padding:16px; border-radius:14px; background:var(--primary); border:none; color:#000; font-weight:700;">Entendido</button>
        </div>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="header">
        <button class="back-btn" onclick="voltar()">
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <span class="step-info" id="stepText">RECUPERAÇÃO</span>
    </div>

    <div class="question-area" id="cpfSection">
        <h2 id="mainTitle">Para continuar, digite seu CPF</h2>
        <div class="input-group">
            <input type="tel" id="cpf" class="input-line" placeholder=" " maxlength="14" autocomplete="off">
            <label class="input-label">CPF cadastrado</label>
        </div>
    </div>

    <div class="question-area" id="senhaSection">
        <h2>Confirme seus dados</h2>
        <p style="color: #9CA3AF; font-size: 14px; margin-top: -30px; margin-bottom: 30px;">Um link de recuperação foi enviado para o e-mail vinculado a este CPF.</p>
        <div class="input-group">
            <input type="email" id="emailRecovery" class="input-line" placeholder=" " autocomplete="off" spellcheck="false">
            <label class="input-label">Confirme seu e-mail</label>
        </div>
    </div>

    <div class="footer">
        <button class="next-btn" id="nextBtn">
            <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
        </button>
    </div>

   <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const cpfInput = document.getElementById('cpf');
    const emailInput = document.getElementById('emailRecovery');
    const nextBtn = document.getElementById('nextBtn');
    const progressBar = document.getElementById('progressBar');
    
    let etapa = 1;

    // Blindagem Modal
    function showZModal(titulo, texto, icon) {
        document.getElementById('zModalGlobal').style.display = 'flex';
        document.getElementById('zTitle').innerText = titulo;
        document.getElementById('zText').innerText = texto;
        document.getElementById('zIcon').innerText = icon;
    }
    document.getElementById('zBtnClose').onclick = () => document.getElementById('zModalGlobal').style.display = 'none';

    // Máscara de CPF
    cpfInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, "");
        v = v.replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d)/, "$1.$2").replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        e.target.value = v;
        nextBtn.classList.toggle('active', v.length === 14);
    });

    emailInput.addEventListener('input', () => {
        nextBtn.classList.toggle('active', emailInput.value.length > 5);
    });

    // AÇÃO PRINCIPAL
    nextBtn.addEventListener('click', async () => {
        if (etapa === 1) {
            // Avança para confirmação de e-mail
            etapa = 2;
            document.getElementById('cpfSection').style.display = 'none';
            document.getElementById('senhaSection').style.display = 'block';
            progressBar.style.width = '100%';
            nextBtn.classList.remove('active');
        } else {
            // Envia o reset real do Firebase
            try {
                await sendPasswordResetEmail(auth, emailInput.value);
                showZModal("Link Enviado", "Enviamos as instruções de redefinição para " + emailInput.value + ". Verifique sua caixa de entrada e spam.", "✅");
                setTimeout(() => { window.location.href = 'login.html'; }, 4000);
            } catch (error) {
                let msg = "Não foi possível enviar o link.";
                if(error.code === 'auth/user-not-found') msg = "Este e-mail não está cadastrado no sistema.";
                showZModal("Erro", msg, "❌");
            }
        }
    });

    window.voltar = function() {
        if (etapa === 2) {
            etapa = 1;
            document.getElementById('cpfSection').style.display = 'block';
            document.getElementById('senhaSection').style.display = 'none';
            progressBar.style.width = '50%';
        } else {
            window.location.href = 'login.html';
        }
    }
</script>

</body>
</html>
