<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Comprovante - TechPay Official</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { 
            --accent: #22c55e; 
            --text-main: #000000;
            --text-muted: #666666;
            --border: #e5e7eb;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: linear-gradient(180deg, #0f172a 0%, #000000 100%); 
            color: #FFF; 
            height: 100vh;
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 20px;
        }

        .document-paper { 
            width: 100%; 
            max-width: 360px; 
            background: #FFFFFF; 
            padding: 30px 25px; 
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: var(--text-main);
            box-sizing: border-box;
        }

        .doc-header { text-align: center; margin-bottom: 30px; }
        .brand { font-size: 18px; font-weight: 800; text-transform: uppercase; }
        .brand span { color: var(--accent); }
        .doc-type { font-size: 15px; font-weight: 600; margin-top: 5px; display: block; }
        .doc-timestamp { font-size: 11px; color: var(--text-muted); }

        .line { border: 0; border-top: 1px solid var(--border); margin: 15px 0; }
        .section-title { font-size: 10px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 10px; display: block; }
        .data-row { margin-bottom: 10px; }
        .data-label { font-size: 10px; color: var(--text-muted); display: block; }
        .data-value { font-size: 13px; font-weight: 600; color: var(--text-main); }

        .amount-box { margin: 20px 0; }
        .amount-value { font-size: 26px; font-weight: 800; }

        .auth-footer { margin-top: 30px; font-family: monospace; font-size: 9px; color: var(--text-muted); }

        /* RODAPÉ AJUSTADO PARA CABER TUDO */
        .fixed-actions {
            background: #000;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            box-sizing: border-box;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .btn-style {
            width: 100%;
            background: #FFFFFF;
            color: #000000;
            border: none;
            padding: 14px; /* Diminuído para dar espaço */
            border-radius: 10px;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-style:active { background: #e5e7eb; }
    </style>
</head>
<body>

    <div class="scroll-container">
        <div class="document-paper" id="printable">
            <div class="doc-header">
                <div class="brand">Tech<span>Pay</span></div>
                <span id="doc-title" class="doc-type">Comprovante</span>
                <span class="doc-timestamp" id="res-time">--/--/----</span>
            </div>
            <hr class="line">
            <div class="amount-box">
                <span class="amount-label" id="label-valor" style="font-size: 11px; color: #666;">Valor</span>
                <div class="amount-value" id="res-val">R$ 0,00</div>
            </div>
            <div id="dados-dinamicos"></div>
            <hr class="line">
            <span class="section-title">Pagador</span>
            <div class="data-row">
                <span class="data-value" id="res-user-name">...</span>
                <span class="data-label">TechPay Pagamentos S.A.</span>
            </div>
            <div class="auth-footer">
                ID: <span id="res-id">...</span><br>
                Autenticação: <span id="res-auth">...</span>
            </div>
        </div>
    </div>

    <div class="fixed-actions">
        <button class="btn-style" onclick="sendToWhatsApp()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8m-11-8l5-5 5 5m-5-5v11"/></svg>
            Enviar Comprovante
        </button>
        <button class="btn-style" onclick="concluirOperacao()">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
            Concluir
        </button>
    </div>

    <script>
        function concluirOperacao() {
            // Limpa dados sensíveis antes de sair
            localStorage.removeItem("ultimoValor");
            localStorage.removeItem("tipoOperacao");
            window.location.href = 'home.html';
        }

        window.onload = function() {
            // Força a rolagem para o topo ao carregar
            window.scrollTo(0,0);
            
            const tipo = localStorage.getItem("tipoOperacao") || "Pix";
            const valor = localStorage.getItem("ultimoValor") || "R$ 0,00";
            
            document.getElementById('res-val').innerText = valor;
            document.getElementById('res-user-name').innerText = localStorage.getItem("usuarioNome") || "Cliente TechPay";
            document.getElementById('res-time').innerText = new Date().toLocaleString('pt-BR');
            document.getElementById('res-id').innerText = "TP" + Math.random().toString(36).substr(2, 15).toUpperCase();
            document.getElementById('res-auth').innerText = Math.random().toString(16).substr(2, 18).toUpperCase();

            const areaDinamica = document.getElementById('dados-dinamicos');
            if (tipo === "Recarga") {
                document.getElementById('doc-title').innerText = "Comprovante de Recarga";
                areaDinamica.innerHTML = `<span class="section-title">Destino</span><div class="data-row"><span class="data-label">Operadora</span><span class="data-value">${localStorage.getItem("operadora") || 'VIVO'}</span></div><div class="data-row"><span class="data-label">Número</span><span class="data-value">${localStorage.getItem("telefone") || '(00) 00000-0000'}</span></div>`;
            } else {
                document.getElementById('doc-title').innerText = "Comprovante de Pix";
                areaDinamica.innerHTML = `<span class="section-title">Recebedor</span><div class="data-row"><span class="data-label">Nome</span><span class="data-value">Leonardo Candido</span></div><div class="data-row"><span class="data-label">Instituição</span><span class="data-value">Nu Pagamentos S.A.</span></div>`;
            }
        };

        async function sendToWhatsApp() {
            const el = document.getElementById("printable");
            const canvas = await html2canvas(el, { scale: 3, backgroundColor: "#ffffff" });
            const blob = await new Promise(res => canvas.toBlob(res, 'image/png'));
            const file = new File([blob], 'Comprovante.png', { type: 'image/png' });
            if (navigator.share) {
                await navigator.share({ files: [file], title: 'Comprovante' });
            }
        }
    </script>
</body>
</html>
