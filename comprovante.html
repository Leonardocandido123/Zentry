<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprovante - TECH Pay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bg: #000; --card: #121826; --accent: #22c55e; --border: #2A3441; }
        body { margin:0; font-family:'Inter', sans-serif; background:var(--bg); color:#FFF; padding:20px; display:flex; flex-direction:column; align-items:center; }
        
        .receipt-container { width:100%; max-width:400px; background:var(--card); border-radius:24px; padding:30px; border:1px solid var(--border); }
        .status-icon { width:60px; height:60px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
        .status-icon svg { width:30px; stroke:#000; fill:none; stroke-width:3; }
        
        .title { text-align:center; font-size:20px; font-weight:700; margin-bottom:30px; }
        .info-group { margin-bottom:18px; }
        .label { font-size:12px; color:#9CA3AF; margin-bottom:4px; display:block; }
        .value { font-size:15px; font-weight:600; }
        .divider { height: 1px; background: #1F2937; margin: 20px 0; }

        .btn-share { width:100%; max-width:400px; padding:16px; border-radius:14px; background:var(--accent); color:#000; font-weight:700; margin-top:20px; border:none; cursor:pointer; }
        .btn-close { background:transparent; border:none; color:#9CA3AF; margin-top:15px; cursor:pointer; font-weight:600; }
    </style>
</head>
<body>

    <div class="receipt-container" id="printable">
        <div class="status-icon">
            <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h1 class="title" id="titulo">Pagamento realizado</h1>

        <div class="info-group">
            <span class="label">Valor</span>
            <span class="value" id="res-val" style="font-size: 24px; color: var(--accent);">R$ 0,00</span>
        </div>

        <div class="divider"></div>

        <div class="info-group">
            <span class="label" id="label-destino">Para</span>
            <span class="value" id="res-nome">---</span>
        </div>

        <div class="info-group">
            <span class="label">Data e Hora</span>
            <span class="value" id="res-data">--/--/----</span>
        </div>

        <div class="info-group">
            <span class="label">ID da Transação</span>
            <span class="value" id="res-id" style="font-family:monospace; font-size:11px;">---</span>
        </div>
    </div>

    <button class="btn-share" onclick="compartilhar()">Compartilhar Comprovante</button>
    <button class="btn-close" onclick="location.href='home.html'">Concluir</button>

    <script>
        // Lógica Inteligente: Vê se foi Recarga ou Pix
        const recarga = JSON.parse(localStorage.getItem('ultimaRecarga'));
        const pixValor = localStorage.getItem("ultimoValor");

        if (recarga && !pixValor) {
            // Se for Recarga
            document.getElementById('titulo').innerText = "Recarga Concluída";
            document.getElementById('label-destino').innerText = "Operadora/Telefone";
            document.getElementById('res-nome').innerText = `${recarga.operadora} (${recarga.telefone})`;
            document.getElementById('res-val').innerText = recarga.valor;
            document.getElementById('res-data').innerText = recarga.data + " " + recarga.hora;
        } else {
            // Se for Pix
            document.getElementById('res-nome').innerText = "Leonardo Candido";
            document.getElementById('res-val').innerText = pixValor || "R$ 0,00";
            document.getElementById('res-data').innerText = new Date().toLocaleString();
        }
        
        document.getElementById('res-id').innerText = "E" + Math.random().toString(36).substr(2, 15).toUpperCase();

        // Limpa os dados temporários após mostrar
        localStorage.removeItem("ultimoValor");
        localStorage.removeItem("ultimaRecarga");

        function compartilhar() {
            // Usa a lógica de compartilhar texto que você já tem
            alert("Comprovante enviado!");
        }
    </script>
</body>
</html>
