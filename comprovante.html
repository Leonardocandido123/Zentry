<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Comprovante Pix - TECH Pay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body { margin:0; font-family:'Inter', sans-serif; background:#000000; color:#E5E7EB; padding:20px; display:flex; flex-direction:column; align-items:center; }
        
        /* Container Principal do Comprovante */
        .receipt-container { width:100%; max-width:400px; background:#121826; border-radius:24px; padding:30px; border:1px solid #2A3441; box-sizing:border-box; }
        
        .status-icon { width:60px; height:60px; background:#22C55E; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 20px; }
        .status-icon svg { width:30px; stroke:#0B0F19; fill:none; stroke-width:3; }
        
        .title { text-align:center; font-size:20px; font-weight:700; margin-bottom:8px; color:#FFF; }
        .subtitle { text-align:center; font-size:14px; color:#9CA3AF; margin-bottom:35px; }
        
        /* Estilização das informações (Padrão Fintech) */
        .info-group { margin-bottom:22px; }
        .label { font-size:12px; color:#9CA3AF; margin-bottom:4px; display:block; font-weight: 500; }
        .value { font-size:15px; font-weight:600; color:#FFF; display:block; }
        .sub-value { font-size:13px; color:#6B7280; display:block; margin-top:1px; }

        .divider { height: 1px; background: #1F2937; margin: 20px 0; border: none; }

        /* Botão de Compartilhar Estilo App */
        .btn-share { 
            width:100%; max-width:400px; padding:16px; border-radius:14px; border:none; 
            background:#22C55E; color:#0B0F19; font-weight:700; font-size:16px; 
            margin-top:25px; cursor:pointer; display:flex; align-items:center; 
            justify-content:center; gap:10px; transition: 0.2s;
        }
        .btn-share:active { transform: scale(0.98); opacity: 0.9; }

        .btn-close { 
            background:transparent; border:none; color:#9CA3AF; 
            margin-top:20px; cursor:pointer; font-weight:600; font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="receipt-container" id="comprovanteConteudo">
        <div class="status-icon">
            <svg viewBox="0 0 24 24"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h1 class="title">Pix enviado</h1>
        <p class="subtitle">Sua transferência foi concluída</p>

        <div class="info-group">
            <span class="label">Valor</span>
            <span class="value" id="valorFinal" style="font-size: 26px; color: #22C55E; font-weight: 700;">R$ 0,00</span>
        </div>

        <div class="divider"></div>

        <div class="info-group">
            <span class="label">Para</span>
            <span class="value">Leonardo Candido</span>
            <span class="sub-value">CPF: ***.123.456-**</span>
            <span class="sub-value">Instituição: Nu Pagamentos - 001</span>
        </div>

        <div class="info-group">
            <span class="label">Origem</span>
            <span class="value" id="nomeOrigem">Seu Nome</span>
            <span class="sub-value">Instituição: UP TECH S.A.</span>
        </div>

        <div class="divider"></div>

        <div class="info-group">
            <span class="label">Tipo de transferência</span>
            <span class="value">Pix</span>
        </div>

        <div class="info-group">
            <span class="label">Data e Hora</span>
            <span class="value" id="dataHora">--/--/----, 00:00</span>
        </div>

        <div class="info-group">
            <span class="label">ID da Transação</span>
            <span class="value" id="idTransacao" style="font-family: monospace; font-size: 11px; color: #6B7280;">E0000000000000000000000</span>
        </div>
    </div>

    <button class="btn-share" onclick="compartilharNativo()">
        <svg style="width:20px; fill:currentColor" viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
        Compartilhar Comprovante
    </button>
    
    <button class="btn-close" onclick="location.href='home.html'">Concluir</button>

    <script>
        // 1. Carregamento de Dados
        const valor = localStorage.getItem("ultimoValor") || "R$ 0,00";
        const nomeUsuario = localStorage.getItem("usuarioNome") || "Usuário UP Tech";
        const dataH = new Date().toLocaleString('pt-BR');
        const idTrans = "E" + Math.random().toString(36).substr(2, 20).toUpperCase();

        document.getElementById("valorFinal").innerText = valor;
        document.getElementById("nomeOrigem").innerText = nomeUsuario;
        document.getElementById("dataHora").innerText = dataH;
        document.getElementById("idTransacao").innerText = idTrans;

        // 2. Lógica de Compartilhamento Nativo (Estilo Fintech)
        async function compartilharNativo() {
            const container = document.getElementById("comprovanteConteudo");
            
            try {
                // Transforma a div do comprovante em imagem
                const canvas = await html2canvas(container, { 
                    backgroundColor: "#0B0F19", 
                    scale: 3, // Alta resolução para o PDF/Imagem
                    logging: false 
                });
                
                const dataUrl = canvas.toDataURL("image/png");
                const blob = await (await fetch(dataUrl)).blob();
                const arquivo = new File([blob], 'Comprovante_Pix_UPTech.png', { type: 'image/png' });

                // Abre a gaveta de compartilhamento do celular
                if (navigator.canShare && navigator.canShare({ files: [arquivo] })) {
                    await navigator.share({
                        files: [arquivo],
                        title: 'Comprovante Pix',
                        text: 'Comprovante de transferência via UP Tech'
                    });
                } else {
                    // Fallback para navegadores que não suportam arquivos (compartilha texto)
                    await navigator.share({
                        title: 'Comprovante Pix',
                        text: `Pix Enviado!\nValor: ${valor}\nPara: Leonardo Candido\nID: ${idTrans}`
                    });
                }
            } catch (err) {
                console.error("Erro ao compartilhar:", err);
            }
        }
    </script>
</body>
</html>
