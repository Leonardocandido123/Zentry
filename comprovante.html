<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<title>Comprovante Zentry</title>
<style>
  :root {
    --primary: #22c55e; 
    --red: #ef4444; 
    --bg: #f8fafc; 
    --text: #0f172a; 
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body { 
    font-family: 'Sora', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 20px;
    min-height: 100vh;
  }

  /* CARD ESTILO COMPROVANTE BANCÁRIO */
  .card-export {
    width: 100%; 
    max-width: 400px; 
    background: #fff; 
    border-radius: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
    overflow: hidden; 
    border: 1px solid var(--border);
  }

  /* CABEÇALHO DINÂMICO */
  .top-info { 
    padding: 32px 24px; 
    text-align: center; 
    border-bottom: 1px solid #f1f5f9; 
  }
  .top-info.entrada { background: linear-gradient(180deg, #f0fdf4 0%, #fff 100%); }
  .top-info.saida { background: linear-gradient(180deg, #fef2f2 0%, #fff 100%); }

  .status-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
  .status-label.entrada { color: var(--primary); }
  .status-label.saida { color: var(--red); }

  .valor-principal { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
  .valor-principal.entrada { color: var(--primary); }
  .valor-principal.saida { color: var(--red); }

  .data-hora { font-size: 13px; color: var(--muted); }

  /* CORPO DO COMPROVANTE */
  .section { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; }
  .section:last-child { border-bottom: none; }
  
  .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 14px; }
  .label { color: var(--muted); font-weight: 400; }
  .value { color: var(--text); font-weight: 600; text-align: right; }
  
  .tx-id { 
    font-family: monospace; 
    background: #f1f5f9; 
    padding: 3px 8px; 
    border-radius: 6px; 
    font-size: 11px; 
    color: var(--muted);
  }

  /* BOTÕES DE AÇÃO */
  .actions { width: 100%; max-width: 400px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .btn { 
    width: 100%; 
    padding: 16px; 
    border-radius: 16px; 
    border: none; 
    font-family: 'Sora', sans-serif; 
    font-weight: 700; 
    font-size: 15px;
    cursor: pointer; 
    transition: 0.2s; 
  }
  .btn-share { background: var(--primary); color: #052e16; box-shadow: 0 4px 15px rgba(34,197,94,0.2); }
  .btn-back { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn:active { transform: scale(0.97); }

  .footer-auth { padding: 16px; text-align: center; background: #fafafa; border-top: 1px dashed var(--border); }
  .auth-text { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div id="cardComprovante" class="card-export">
    <div style="padding:50px; text-align:center; color:var(--muted)">Buscando transação...</div>
</div>

<div class="actions">
  <button class="btn btn-share" onclick="compartilhar()">📤 Compartilhar Comprovante</button>
  <button class="btn btn-back" onclick="window.history.back()">Voltar</button>
</div> 

  <script type="module">
import { db, ZentryUI, ZentryUser } from "./zentry-core.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function renderizar() {
    const container = document.getElementById('cardComprovante');
    
    try {
        const params = new URLSearchParams(window.location.search);
        const txId = params.get("id");

        if (!txId) {
            container.innerHTML = "<div style='padding:40px; text-align:center;'>ID da transação não encontrado.</div>";
            return;
        }

        // 1. TENTATIVA A: Pegar o ID que salvamos no login (mais rápido)
        let userDocId = localStorage.getItem("idUsuarioLogado");

        // 2. TENTATIVA B: Se não tiver o ID, busca pelo e-mail (teu fallback)
        if (!userDocId) {
            userDocId = await ZentryUser.obterIdPorEmail();
        }

        // 3. LOG DE SEGURANÇA (Verifica no console se aparece user_914718)
        console.log("Caminho: usuarios /", userDocId, "/ transacoes /", txId);

        if (!userDocId) {
            container.innerHTML = "<div style='padding:40px; text-align:center;'>Erro: Utilizador não identificado.</div>";
            return;
        }

        // 4. BUSCA DIRETA NO CAMINHO QUE VIMOS NA FOTO
        const docRef = doc(db, "usuarios", userDocId, "transacoes", txId);
        const snap = await getDoc(docRef);
        
        if (!snap.exists()) {
            container.innerHTML = `
                <div style='padding:40px; text-align:center;'>
                    <p>Transação não encontrada.</p>
                    <small style="color:gray">ID: ${txId}</small><br>
                    <small style="color:gray">Caminho: ${userDocId}</small>
                </div>`;
            return;
        }

        const d = snap.data();
        const isSaida = d.tipo !== 'entrada';

        container.innerHTML = `
            <div class="top-info ${isSaida ? 'saida' : 'entrada'}">
                <div class="status-label ${isSaida ? 'saida' : 'entrada'}">${d.descricao || 'Transação'}</div>
                <div class="valor-principal ${isSaida ? 'saida' : 'entrada'}">${ZentryUI.formatarMoeda(d.valor)}</div>
                <div class="data-hora">${ZentryUI.formatarData(d.timestamp)}</div>
            </div>

            <div class="section">
                <div class="row"><span class="label">ID Transação</span><span class="value"><span class="tx-id">${txId}</span></span></div>
                <div class="row"><span class="label">Status</span><span class="value" style="color:var(--primary)">✓ Concluída</span></div>
            </div>

            <div class="section">
                <div class="row"><span class="label">Tipo</span><span class="value">${d.tipo === 'recarga' ? 'Recarga de Telemóvel' : 'Transferência'}</span></div>
                <div class="row"><span class="label">Instituição</span><span class="value">ZENTRY BANK</span></div>
            </div>

            <div class="footer-auth">
                <div class="auth-text">Autenticação: ${txId.substring(0,12).toUpperCase()}</div>
            </div>
        `;

    } catch (e) {
        console.error("Erro no Comprovante:", e);
        container.innerHTML = "<div style='padding:40px; text-align:center;'>Erro de conexão com o banco.</div>";
    }
}

renderizar();
  </script>
  
</body>
</html>
