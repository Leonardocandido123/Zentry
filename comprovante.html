<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comprovante</title>

<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e5e7eb;
  --green:#16a34a;
  --red:#dc2626;
}

body{
  margin:0;
  background:var(--bg);
  font-family:'Sora',sans-serif;
}

.card{
  max-width:420px;
  margin:30px auto;
  background:#fff;
  border-radius:24px;
  border:1px solid var(--border);
  overflow:hidden;
}

/* TOPO */
.top{
  padding:30px;
  text-align:center;
  background:linear-gradient(180deg,#f0fdf4,#fff);
}
.top.neg{background:linear-gradient(180deg,#fef2f2,#fff);}

.status{
  font-size:12px;
  font-weight:700;
}
.status.pos{color:var(--green);}
.status.neg{color:var(--red);}

.valor{
  font-size:40px;
  font-weight:800;
  margin:8px 0;
}
.valor.pos{color:var(--green);}
.valor.neg{color:var(--red);}

.data{
  font-size:12px;
  color:var(--muted);
}

/* SEÇÕES */
.section{
  padding:20px;
  border-top:1px solid var(--border);
}

.title{
  font-size:11px;
  font-weight:700;
  color:var(--muted);
  margin-bottom:10px;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:10px 0;
}

.label{color:var(--muted);}
.value{font-weight:600;text-align:right;}

.tx{
  font-family:monospace;
  background:#f1f5f9;
  padding:4px 8px;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="card">
  <div id="top" class="top">
    <div id="status" class="status"></div>
    <div id="valor" class="valor"></div>
    <div id="data" class="data"></div>
  </div>

  <div id="conteudo"></div>
</div>

<script type="module">
import { db } from './zentry-core.js';
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const url = new URLSearchParams(window.location.search);
const id = url.get("id");

if(!id){
 document.body.innerHTML = "Comprovante inválido";
 throw "";
}

const ref = doc(db,"transacoes",id);
const snap = await getDoc(ref);

if(!snap.exists()){
 document.body.innerHTML = "Transação não encontrada";
 throw "";
}

const d = snap.data();

/* FORMAT */
const fmt = v => Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
const data = new Date(d.criadoEm.seconds*1000).toLocaleString('pt-BR');

/* TIPO */
const entrada = d.direcao === "entrada";

/* UI */
document.getElementById("top").classList.add(entrada?"":"neg");
document.getElementById("status").classList.add(entrada?"pos":"neg");
document.getElementById("valor").classList.add(entrada?"pos":"neg");

document.getElementById("status").innerText =
 d.status === "pendente" ? "Pendente" :
 entrada ? "Recebido" : "Pagamento realizado";

document.getElementById("valor").innerText = fmt(d.valor);
document.getElementById("data").innerText = data;

/* CONTEÚDO UNIVERSAL */
document.getElementById("conteudo").innerHTML = `

<div class="section">
<div class="title">Transação</div>

<div class="row"><span class="label">Tipo</span><span class="value">${d.tipo}</span></div>
<div class="row"><span class="label">Descrição</span><span class="value">${d.descricao||"-"}</span></div>
<div class="row"><span class="label">ID</span><span class="value"><span class="tx">${d.id}</span></span></div>
</div>

<div class="section">
<div class="title">Destino</div>

<div class="row"><span class="label">Nome</span><span class="value">${d.destino?.nome||"-"}</span></div>
<div class="row"><span class="label">Chave</span><span class="value">${d.destino?.chave||"-"}</span></div>
<div class="row"><span class="label">Instituição</span><span class="value">${d.destino?.instituicao||"-"}</span></div>
</div>

<div class="section">
<div class="title">Origem</div>

<div class="row"><span class="label">Nome</span><span class="value">${d.origem?.nome||"-"}</span></div>
<div class="row"><span class="label">Instituição</span><span class="value">${d.origem?.instituicao||"ZENTRY"}</span></div>
</div>

`;
</script>

</body>
</html>
