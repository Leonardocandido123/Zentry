
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Meus Dados</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #22c55e; 
            --bg-card: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            color: #fff; min-height: 100vh;
        }
        .container { padding: 25px; max-width: 450px; margin: auto; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
        .back-nav {
            display: inline-flex; align-items: center; justify-content: center;
            width: 40px; height: 40px; background: var(--bg-card);
            border-radius: 50%; color: #fff; text-decoration: none; border: 1px solid var(--border);
        }
        h1 { font-size: 22px; font-weight: 800; margin: 0; }

        /* CAMPOS DE DADOS */
        .data-group { display: flex; flex-direction: column; gap: 18px; margin-bottom: 40px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        .field label { font-size: 11px; text-transform: uppercase; color: var(--text-sec); letter-spacing: 1px; font-weight: 700; padding-left: 5px; }
        .input-box {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            padding: 16px; border-radius: 16px;
            font-size: 15px; color: #e2e8f0; font-weight: 500;
            display: flex; align-items: center; justify-content: space-between;
        }
        .input-box.locked { opacity: 0.7; cursor: not-allowed; }

        /* BOTÕES */
        .actions { display: flex; flex-direction: column; gap: 12px; }
        .btn-save {
            background: var(--primary); color: #000; border: none;
            padding: 18px; border-radius: 18px; font-weight: 800; font-size: 16px;
            transition: 0.2s; cursor: pointer;
        }
        .btn-delete {
            background: transparent; color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 18px; border-radius: 18px; font-weight: 700; font-size: 14px;
            transition: 0.2s; cursor: pointer; margin-top: 10px;
        }
        .btn-save:active, .btn-delete:active { transform: scale(0.96); }

        /* MODAL */
        .modal-overlay {
            display: none; position: fixed; inset: 0; 
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            z-index: 2000; align-items: center; justify-content: center; padding: 25px;
        }
        .modal-card {
            background: #111; width: 100%; max-width: 340px; 
            border-radius: 28px; padding: 30px; border: 1px solid var(--border); text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="perfil.html" class="back-nav"><i data-lucide="arrow-left"></i></a>
        <h1>Meus Dados</h1>
    </div>

    <div class="data-group">
        <div class="field">
            <label>Nome Completo</label>
            <div class="input-box locked" id="val-nome">Carregando...</div>
        </div>
        <div class="field">
            <label>CPF</label>
            <div class="input-box locked" id="val-cpf">000.***.***-00</div>
        </div>
        <div class="field">
            <label>E-mail</label>
            <div class="input-box" id="val-email">---</div>
        </div>
        <div class="field">
            <label>Contato / Celular</label>
            <div class="input-box" id="val-phone">---</div>
        </div>
    </div>

    <div class="actions">
        <button class="btn-save" onclick="location.href='perfil.html'">Concluir</button>
        <button class="btn-delete" onclick="abrirModalExcluir()">Excluir minha conta</button>
    </div>
</div>

<div id="modal-delete" class="modal-overlay">
    <div class="modal-card">
        <div style="color: var(--danger); margin-bottom: 15px;"><i data-lucide="alert-triangle" size="40"></i></div>
        <h2 style="margin: 0 0 10px 0;">Tem certeza?</h2>
        <p style="color: var(--text-sec); font-size: 14px; line-height: 1.5; margin-bottom: 25px;">
            Ao excluir sua conta, todos os seus dados e saldo serão removidos permanentemente. Esta ação não pode ser desfeita.
        </p>
        <button onclick="confirmarExclusao()" style="width:100%; background:var(--danger); color:#fff; border:none; padding:16px; border-radius:14px; font-weight:800; margin-bottom:10px;">Excluir Agora</button>
        <button onclick="fecharModal()" style="width:100%; background:transparent; color:#fff; border:none; font-weight:600;">Cancelar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = { 
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    lucide.createIcons();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                const dados = userDoc.data();
                document.getElementById("val-nome").innerText = dados.nome || "Não informado";
                document.getElementById("val-cpf").innerText = dados.cpf || "Não informado";
                document.getElementById("val-email").innerText = user.email; // Pega do Auth
                document.getElementById("val-phone").innerText = dados.telefone || "Não informado";
            }
        } else {
            window.location.replace("login.html");
        }
    });

    window.abrirModalExcluir = () => { document.getElementById('modal-delete').style.display = 'flex'; };
    window.fecharModal = () => { document.getElementById('modal-delete').style.display = 'none'; };

    window.confirmarExclusao = async () => {
        const user = auth.currentUser;
        if (user) {
            try {
                // Remove do Firestore
                await deleteDoc(doc(db, "usuarios", user.uid));
                // Remove do Auth
                await user.delete();
                alert("Conta excluída com sucesso.");
                window.location.replace("login.html");
            } catch (error) {
                alert("Para excluir sua conta, você precisa ter feito login recentemente. Saia e entre novamente antes de excluir.");
            }
        }
    };
</script>
</body>
</html>
