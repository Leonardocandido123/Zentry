<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>

<style>
:root { 
    --primary: #22c55e; 
    --bg-card: rgba(255, 255, 255, 0.05); 
    --border: rgba(255, 255, 255, 0.08); 
    --text-secondary: #94a3b8;
    --danger: #ef4444;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
    color: #fff;
    min-height: 100vh;
}

.container {
    padding: 25px;
    max-width: 450px;
    margin: auto;
}

/* SETA DE VOLTAR */
.back-nav {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 45px;
    height: 45px;
    background: var(--bg-card);
    border-radius: 50%;
    color: #fff;
    text-decoration: none;
    margin-bottom: 20px;
    border: 1px solid var(--border);
}

/* HEADER DO PERFIL */
.profile-header {
    text-align: center;
    margin-bottom: 35px;
}

.avatar-wrapper {
    position: relative;
    width: 110px; /* Um pouco maior para destaque */
    height: 110px;
    margin: 0 auto 15px;
    cursor: pointer;
}

.avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #1e293b;
    border: 3px solid var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--primary);
    overflow: hidden;
    box-shadow: 0 0 20px rgba(34, 197, 94, 0.15);
    transition: 0.2s ease;
}

.avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* O LÁPIS INDICADOR */
.edit-badge {
    position: absolute;
    right: 2px;
    bottom: 2px;
    width: 32px;
    height: 32px;
    background: var(--primary);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #000;
    border: 3px solid #000; /* Separação visual da foto */
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.profile-header h2 {
    font-size: 24px;
    font-weight: 800;
    margin: 0;
    letter-spacing: -1px;
}

/* CAMPOS INDIVIDUAIS */
.menu-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 30px;
}

.menu-item {
    background: var(--bg-card);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    border: 1px solid var(--border);
    padding: 18px 20px;
    display: flex;
    align-items: center;
    gap: 15px;
    text-decoration: none;
    color: #fff;
    transition: 0.2s ease;
}

.menu-item:active {
    transform: scale(0.97);
    background: rgba(255, 255, 255, 0.1);
}

.icon-box {
    width: 40px;
    height: 40px;
    background: rgba(255, 255, 255, 0.05);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
}

.item-info { flex: 1; }
.item-info b { display: block; font-size: 15px; margin-bottom: 2px; }
.item-info span { font-size: 12px; color: var(--text-secondary); }

.chevron { color: var(--border); }

</style>
</head>

<body>

<div class="container">

    <a href="home.html" class="back-nav">
        <i data-lucide="chevron-left"></i>
    </a>

    <div class="profile-header">
        <input type="file" id="photo-input" style="display: none;" accept="image/*" onchange="previewFoto(this)">
        
        <div class="avatar-wrapper" onclick="document.getElementById('photo-input').click()">
            <div class="avatar" id="avatar-image">
                <i data-lucide="user" style="width: 45px; height: 45px;"></i>
            </div>
            <div class="edit-badge">
                <i data-lucide="pencil" style="width: 14px; height: 14px; stroke-width: 3;"></i>
            </div>
        </div>
        
        <h2 id="nomeUser">Leonardo</h2>
    </div>

    <div class="menu-group">
        <a href="meus-dados.html" class="menu-item">
            <div class="icon-box"><i data-lucide="info"></i></div>
            <div class="item-info">
                <b>Meus Dados</b>
                <span>Nome, CPF e telefone</span>
            </div>
            <i data-lucide="chevron-right" class="chevron"></i>
        </a>

        <a href="chaves-pix.html" class="menu-item">
            <div class="icon-box"><i data-lucide="qr-code"></i></div>
            <div class="item-info">
                <b>Chaves Pix</b>
                <span>Gerenciar recebimentos</span>
            </div>
            <i data-lucide="chevron-right" class="chevron"></i>
        </a>

        <a href="ajustes.html" class="menu-item">
            <div class="icon-box"><i data-lucide="settings"></i></div>
            <div class="item-info">
                <b>Ajustes</b>
                <span>Configurações do app</span>
            </div>
            <i data-lucide="chevron-right" class="chevron"></i>
        </a>

        <a href="ajuda.html" class="menu-item">
            <div class="icon-box"><i data-lucide="help-circle"></i></div>
            <div class="item-info">
                <b>Ajuda</b>
                <span>Suporte e chat</span>
            </div>
            <i data-lucide="chevron-right" class="chevron"></i>
        </a>

        <div class="menu-item" onclick="logout()" style="margin-top: 10px; border-color: rgba(239, 68, 68, 0.2);">
            <div class="icon-box" style="color: #ef4444; background: rgba(239, 68, 68, 0.1);"><i data-lucide="log-out"></i></div>
            <div class="item-info">
                <b style="color: #ef4444;">Sair da conta</b>
                <span>Encerrar sessão no aparelho</span>
            </div>
        </div>

        <a href="encerrar.html" class="menu-item" style="opacity: 0.6; background: transparent; border: none;">
            <div class="icon-box"><i data-lucide="alert-triangle"></i></div>
            <div class="item-info">
                <b>Encerrar conta</b>
                <span>Solicitar cancelamento</span>
            </div>
            <i data-lucide="chevron-right" class="chevron"></i>
        </a>
    </div>

</div>

<script>
    lucide.createIcons();

    function previewFoto(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                const avatar = document.getElementById('avatar-image');
                avatar.innerHTML = `<img src="${e.target.result}" alt="Foto de Perfil">`;
                localStorage.setItem('perfil_foto', e.target.result);
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    function carregarDados() {
        const nome = localStorage.getItem("nome") || "Leonardo";
        document.getElementById("nomeUser").innerText = nome;
        
        const fotoSalva = localStorage.getItem('perfil_foto');
        if (fotoSalva) {
            const avatar = document.getElementById('avatar-image');
            avatar.innerHTML = `<img src="${fotoSalva}" alt="Foto de Perfil">`;
        }
    }

    function logout() {
        if(confirm("Deseja realmente sair da conta?")) {
            localStorage.setItem("techpay_user","false");
            window.location.href="login.html";
        }
    }

    carregarDados();
</script>

</body>
</html>
