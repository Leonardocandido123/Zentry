
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Tech Pay - Meu Perfil</title>
  <style>
    :root { 
        --primary: #22c55e; 
        --bg-card: #111827;
        --border: rgba(255, 255, 255, 0.1); 
        --text-secondary: #9CA3AF; 
    }
    
    body { margin:0; font-family:'Inter',sans-serif; background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%); color: #fff; overflow-x: hidden; padding-bottom: 40px; }
    .container { padding: 20px; max-width: 450px; margin: auto; }

    /* VOLTAR */
    .back-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 30px; cursor: pointer; text-decoration: none; color: #fff; }
    
    /* HEADER PERFIL */
    .profile-header { text-align: center; margin-bottom: 35px; }
    .avatar-large { 
        width: 100px; height: 100px; background: var(--bg-card); border-radius: 50%; 
        margin: 0 auto 15px; display: flex; align-items: center; justify-content: center;
        border: 2px solid var(--primary); box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        position: relative;
    }
    .edit-badge {
        position: absolute; bottom: 0; right: 0; background: var(--primary);
        width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        border: 3px solid #000;
    }
    .profile-header h2 { margin: 10px 0 5px; font-size: 24px; }
    .plan-badge { 
        display: inline-block; background: rgba(34, 197, 94, 0.15); color: var(--primary);
        padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase;
    }

    /* SEÇÕES DE OPÇÕES */
    .menu-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; overflow: hidden; margin-bottom: 20px; }
    .menu-item { 
        display: flex; align-items: center; justify-content: space-between; padding: 18px 20px;
        border-bottom: 1px solid var(--border); cursor: pointer; transition: 0.2s; text-decoration: none; color: #fff;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: rgba(255,255,255,0.05); }
    
    .menu-info { display: flex; align-items: center; gap: 15px; }
    .icon-wrapper { width: 38px; height: 38px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; color: var(--text-secondary); }
    
    .menu-text b { display: block; font-size: 14px; }
    .menu-text span { font-size: 11px; color: var(--text-secondary); }

    /* BOTÃO SAIR */
    .logout-btn { 
        width: 100%; padding: 16px; border-radius: 18px; border: 1px solid #ef4444; background: transparent;
        color: #ef4444; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s;
    }
    .logout-btn:active { background: #ef4444; color: #fff; }

    svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 2; }
  </style>
</head>
<body>

<div class="container">
  <a href="home.html" class="back-nav">
    <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    <span>Voltar</span>
  </a>

  <div class="profile-header">
    <div class="avatar-large">
        <svg viewBox="0 0 24 24" style="width: 50px; height: 50px;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        <div class="edit-badge">
            <svg viewBox="0 0 24 24" style="width: 14px; height: 14px; color: #000;"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
        </div>
    </div>
    <h2>Leonardo Silva</h2>
    <div class="plan-badge"></div>
  </div>

  <div class="menu-section">
    <div class="menu-item">
        <div class="menu-info">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
            <div class="menu-text">
                <b>Meus Dados</b>
                <span>Nome, CPF e telefone</span>
            </div>
        </div>
        <svg viewBox="0 0 24 24" style="width: 16px;"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="menu-item">
        <div class="menu-info">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>
            <div class="menu-text">
                <b>Chaves Pix</b>
                <span>Gerencie seus recebimentos</span>
            </div>
        </div>
        <svg viewBox="0 0 24 24" style="width: 16px;"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-item">
        <div class="menu-info">
            <div class="icon-wrapper" style="color: #fbbf24;"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
            <div class="menu-text">
                <b>Segurança</b>
                <span>Senha, Biometria e limites</span>
            </div>
        </div>
        <svg viewBox="0 0 24 24" style="width: 16px;"><path d="M9 18l6-6-6-6"/></svg>
    </div>
    <div class="menu-item">
        <div class="menu-info">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
            <div class="menu-text">
                <b>Notificações</b>
                <span>Alertas de cobrança e saldo</span>
            </div>
        </div>
        <svg viewBox="0 0 24 24" style="width: 16px;"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>

  <div class="menu-section">
    <div class="menu-item">
        <div class="menu-info">
            <div class="icon-wrapper"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12" y2="17"/></svg></div>
            <div class="menu-text">
                <b>Ajuda e Suporte</b>
                <span>Fale com o Tech Pay</span>
            </div>
        </div>
        <svg viewBox="0 0 24 24" style="width: 16px;"><path d="M9 18l6-6-6-6"/></svg>
    </div>
  </div>

  <button class="logout-btn" onclick="logout()">Sair da conta</button>

</div>

<script>
function logout() {
    localStorage.setItem('techpay_user', 'false');
    window.location.href = 'login.html';
}
</script>

</body>
                                                                                                                                                                                            </html>
