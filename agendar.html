<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>TECH Pay - Programar Pix</title>
  <style>
    :root { 
      --bg: #000000; 
      --card: #121826; 
      --border: #2A3441; 
      --accent: #22C55E; 
      --text-sec: #9CA3AF;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
    .back-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; }
    .back-btn svg { stroke: var(--accent); width: 22px; fill: none; stroke-width: 2.5; }

    /* INPUTS */
    .field-group { margin-bottom: 25px; }
    .label { color: var(--text-sec); font-size: 13px; margin-bottom: 10px; display: block; font-weight: 600; text-transform: uppercase; }
    
    .input-box { 
      width: 100%; background: var(--card); border: 1px solid var(--border); 
      border-radius: 18px; padding: 18px; color: white; font-size: 16px; outline: none;
      transition: 0.3s;
    }
    .input-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(34, 197, 94, 0.1); }

    /* BOTÃO FIXO */
    .confirm-btn { 
      position: fixed; bottom: 30px; left: 20px; right: 20px; 
      background: var(--accent); color: #000; border: none; 
      padding: 20px; border-radius: 22px; font-weight: 700; font-size: 16px;
      cursor: pointer; transition: 0.2s; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
    }
    .confirm-btn:active { transform: scale(0.96); }

    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }

    .info-card {
      background: rgba(34, 197, 94, 0.05); padding: 18px; border-radius: 18px; border: 1px dashed var(--accent);
      display: flex; gap: 12px; align-items: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="back-btn" onclick="location.href='pix.html'">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <b style="font-size: 22px; letter-spacing: -0.5px;">Programar</b>
  </div>

  <div class="field-group">
    <span class="label">Nome ou Chave</span>
    <input type="text" class="input-box" placeholder="Ex: leonardo@email.com">
  </div>

  <div class="field-group">
    <span class="label">Valor do Pix</span>
    <input type="text" class="input-box" placeholder="R$ 0,00" id="valor">
  </div>

  <div class="field-group">
    <span class="label">Data do agendamento</span>
    <input type="date" class="input-box">
  </div>

  <div class="info-card">
    <div style="font-size: 20px;">💡</div>
    <p style="font-size: 12px; color: var(--text-sec); margin: 0; line-height: 1.4;">
      O valor será debitado automaticamente na data escolhida. <b style="color: var(--accent);">Mantenha o saldo em conta.</b>
    </p>
  </div>

<button class="confirm-btn" onclick="agendarPix()">
  Agendar Transferência
</button>
  
  <script>
    // Máscara simples para dinheiro
    document.getElementById('valor').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g,'');
      v = (v/100).toFixed(2) + '';
      v = v.replace(".", ",");
      v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
      e.target.value = "R$ " + v;
    });
    function agendarPix() {
    const valor = document.getElementById('valor').value;
    const destino = document.querySelector('input[placeholder="Ex: leonardo@email.com"]').value;
    const dataAgendada = document.querySelector('input[type="date"]').value;

    if(!valor || valor === "R$ 0,00" || !destino || !dataAgendada) {
        return alert("Preencha todos os campos!");
    }

    // Configura o comprovante dinâmico
    localStorage.setItem("tipoTransacao", "pix"); // Usa o layout de Pix
    localStorage.setItem("ultimoValor", valor);
    localStorage.setItem("destinoNome", "Agendado para: " + destino);
    localStorage.setItem("detalhesExtras", "Data: " + dataAgendada.split('-').reverse().join('/'));
    localStorage.setItem("instDestino", "Pagamento Programado");

    // No agendamento, geralmente não desconta o saldo na hora, 
    // mas se quiser descontar, adicione a lógica de saldo aqui.

    alert('Pix agendado com sucesso!');
    window.location.href = 'comprovante.html';
    }
    
  </script>
</body>
</html>
