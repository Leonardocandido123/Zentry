<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ZENTRY - Programar Pix</title>
  <style>
    :root { 
      --bg: #000000; 
      --card: #121826; 
      --border: #2A3441; 
      --accent: #22C55E; 
      --text-sec: #9CA3AF;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
    .back-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; border: none; }
    .back-btn svg { stroke: var(--accent); width: 22px; fill: none; stroke-width: 2.5; }

    /* INPUTS */
    .field-group { margin-bottom: 25px; }
    .label { color: var(--text-sec); font-size: 13px; margin-bottom: 10px; display: block; font-weight: 600; text-transform: uppercase; }
    
    .input-box { 
      width: 100%; background: var(--card); border: 1px solid var(--border); 
      border-radius: 18px; padding: 18px; color: white; font-size: 16px; outline: none;
      transition: 0.3s;
    }
    .input-box:focus { border-color: var(--accent); box-shadow: 0 0 10px rgba(34, 197, 94, 0.1); }

    /* BOTÃO FIXO */
    .confirm-btn { 
      position: fixed; bottom: 30px; left: 20px; right: 20px; 
      background: var(--accent); color: #000; border: none; 
      padding: 20px; border-radius: 22px; font-weight: 700; font-size: 16px;
      cursor: pointer; transition: 0.2s; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
    }
    .confirm-btn:active { transform: scale(0.96); }

    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; }

    .info-card {
      background: rgba(34, 197, 94, 0.05); padding: 18px; border-radius: 18px; border: 1px dashed var(--accent);
      display: flex; gap: 12px; align-items: center;
    }
  </style>
</head>
<body>

  <div class="header">
    <button class="back-btn" onclick="location.href='pix.html'">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <b style="font-size: 22px; letter-spacing: -0.5px;">Programar Pix</b>
  </div>

  <div class="field-group">
    <span class="label">Nome ou Chave</span>
    <input type="text" id="destinoChave" class="input-box" placeholder="Ex: leonardo@email.com">
  </div>

  <div class="field-group">
    <span class="label">Valor do Pix</span>
    <input type="text" id="valor" class="input-box" placeholder="R$ 0,00" inputmode="decimal">
  </div>

  <div class="field-group">
    <span class="label">Data do agendamento</span>
    <input type="date" id="dataPgto" class="input-box">
  </div>

  <div class="info-card">
    <div style="font-size: 20px;">💡</div>
    <p style="font-size: 12px; color: var(--text-sec); margin: 0; line-height: 1.4;">
      O valor será debitado automaticamente na data escolhida. <b style="color: var(--accent);">Mantenha o saldo em conta.</b>
    </p>
  </div>

  <button class="confirm-btn" id="btnAgendar">
    Agendar Transferência
  </button>
  
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userLogado = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userLogado = user;
        } else {
            window.location.href = 'login.html';
        }
    });

    // Máscara de Moeda (Igual ao Scanner)
    const inputValor = document.getElementById('valor');
    inputValor.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        e.target.value = v;
    });

    function limparParaNumero(valorStr) {
        return parseFloat(valorStr.replace(/[^\d,]/g, '').replace(',', '.'));
    }

    document.getElementById('btnAgendar').onclick = async () => {
        const valorStr = inputValor.value;
        const destino = document.getElementById('destinoChave').value;
        const dataAgendada = document.getElementById('dataPgto').value;

        if(!valorStr || valorStr === "R$ 0,00" || !destino || !dataAgendada) {
            alert("Preencha todos os campos corretamente!");
            return;
        }

        const valorNum = limparParaNumero(valorStr);

        try {
            // Salva na coleção de AGENDAMENTOS (não mexe no saldo agora)
            await addDoc(collection(db, "agendamentos"), {
                uid: userLogado.uid,
                destino: destino,
                valor: valorNum,
                valorFormatado: valorStr,
                dataProgramada: dataAgendada,
                status: "Pendente",
                dataCriacao: new Date().toLocaleString('pt-BR')
            });

            // Configura o LocalStorage para o comprovante
            localStorage.setItem("transacao_pendente", JSON.stringify({
                nomeDestino: destino,
                valor: valorStr,
                data: dataAgendada.split('-').reverse().join('/'),
                bancoDestino: "Zentry Bank",
                chavePix: destino,
                id: "SCH" + Math.floor(100000 + Math.random() * 900000),
                tipo: "AGENDAMENTO"
            }));

            alert('Pix agendado com sucesso!');
            window.location.href = 'comprovante.html';

        } catch (error) {
            console.error(error);
            alert("Erro ao salvar agendamento.");
        }
    };
  </script>
</body>
</html>
