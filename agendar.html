<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ZENTRY - Programar Pix</title>
  <style>
    :root { --bg: #000000; --card: #121826; --border: #2A3441; --accent: #22C55E; --text-sec: #9CA3AF; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; overflow-x: hidden; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
    .back-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; }
    .back-btn svg { stroke: var(--accent); width: 22px; fill: none; stroke-width: 2.5; }

    /* INPUTS */
    .field-group { margin-bottom: 25px; }
    .label { color: var(--text-sec); font-size: 13px; margin-bottom: 10px; display: block; font-weight: 600; text-transform: uppercase; }
    .input-box { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 18px; padding: 18px; color: white; font-size: 16px; outline: none; }
    
    /* BOTÃO FIXO */
    .confirm-btn { position: fixed; bottom: 30px; left: 20px; right: 20px; background: var(--accent); color: #000; border: none; padding: 20px; border-radius: 22px; font-weight: 700; font-size: 16px; cursor: pointer; }

    /* MODAL ESTILO ZENTRY */
    #zModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px); }
    .modal-content { background:#121826; border:1px solid #2A3441; border-radius:28px; width:100%; max-width:340px; padding:25px; text-align:center; animation: popIn 0.2s ease-out; }
    @keyframes popIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
    
    .info-card { background: rgba(34, 197, 94, 0.05); padding: 18px; border-radius: 18px; border: 1px dashed var(--accent); display: flex; gap: 12px; align-items: center; }
  </style>
</head>
<body>

  <div id="zModal">
    <div class="modal-content">
      <div id="zIcon" style="font-size:40px; margin-bottom:15px;">⏳</div>
      <h3 id="zTitle" style="margin:0 0 10px; font-size:18px; color:#fff;">Agendando...</h3>
      <p id="zText" style="color:#9CA3AF; font-size:14px; margin-bottom:20px;"></p>
      <button onclick="fecharModalESair()" id="zBtn" style="width:100%; padding:15px; border-radius:14px; background:#22C55E; border:none; color:#000; font-weight:700; display:none;">Entendido</button>
    </div>
  </div>

  <div class="header">
    <div class="back-btn" onclick="location.href='pix.html'">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <b style="font-size: 22px;">Programar Pix</b>
  </div>

  <div class="field-group">
    <span class="label">Nome ou Chave</span>
    <input type="text" id="destino" class="input-box" placeholder="Chave Pix">
  </div>

  <div class="field-group">
    <span class="label">Valor do Pix</span>
    <input type="text" id="valor" class="input-box" placeholder="R$ 0,00">
  </div>

  <div class="field-group">
    <span class="label">Data do agendamento</span>
    <input type="date" id="dataPgto" class="input-box">
  </div>

  <div class="info-card">
    <div style="font-size: 20px;">💡</div>
    <p style="font-size: 12px; color: var(--text-sec); margin: 0;">
      O valor será debitado automaticamente. <b style="color: var(--accent);">Mantenha saldo em conta.</b>
    </p>
  </div>

  <button class="confirm-btn" onclick="agendarPix()">Agendar Transferência</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = { 
      apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU", 
      authDomain: "zentry-app-74275.firebaseapp.com", 
      projectId: "zentry-app-74275", 
      storageBucket: "zentry-app-74275.appspot.com", 
      messagingSenderId: "571422826071", 
      appId: "1:571422826071:web:ba1ca6fea76e360bb80d12" 
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // MÁSCARA MOEDA
    document.getElementById('valor').addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g,'');
      v = (v/100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
      e.target.value = v;
    });

    window.agendarPix = async () => {
      const valStr = document.getElementById('valor').value;
      const dest = document.getElementById('destino').value;
      const data = document.getElementById('dataPgto').value;

      if (!valStr || valStr === "R$ 0,00" || !dest || !data) {
        showZModal("Aviso", "Preencha todos os campos!", "⚠️", false);
        return;
      }

      showZModal("Processando", "Salvando seu agendamento...", "⏳", false);

      try {
        await addDoc(collection(db, "agendamentos"), {
          uid: auth.currentUser.uid,
          destino: dest,
          valor: valStr,
          dataPara: data,
          status: "Pendente",
          criadoEm: new Date().toISOString()
        });

        // Configura LocalStorage para o comprovante
        localStorage.setItem("transacao_pendente", JSON.stringify({
            nomeDestino: dest,
            valor: valStr,
            data: data.split('-').reverse().join('/'),
            id: "ZNT" + Math.floor(Math.random() * 999999),
            tipo: "AGENDAMENTO"
        }));

        showZModal("Sucesso!", "Pix agendado com sucesso!", "✅", true);
      } catch (e) {
        showZModal("Erro", "Falha ao agendar.", "❌", true);
      }
    };

    function showZModal(titulo, texto, icon, showBtn) {
      document.getElementById('zModal').style.display = 'flex';
      document.getElementById('zTitle').innerText = titulo;
      document.getElementById('zText').innerText = texto;
      document.getElementById('zIcon').innerText = icon;
      document.getElementById('zBtn').style.display = showBtn ? 'block' : 'none';
      if(showBtn && icon === "✅") {
          document.getElementById('zBtn').onclick = () => window.location.href = 'comprovante.html';
      } else {
          document.getElementById('zBtn').onclick = fecharModal;
      }
    }

    function fecharModal() { document.getElementById('zModal').style.display = 'none'; }
    window.fecharModalESair = fecharModal;
  </script>
</body>
</html>
