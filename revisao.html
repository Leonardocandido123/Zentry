<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Revisão - ZENTRY</title>
    <style>
        :root { --accent: #22c55e; --bg: #000; --card: #111; --border: #2A3441; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: #000; color: #fff; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .header { padding: 30px 20px 15px; display: flex; align-items: center; gap: 15px; }
        .content { flex: 1; padding: 20px; overflow-y: auto; }
        h1 { font-size: 20px; font-weight: 700; margin: 0; }
        p { color: #9CA3AF; font-size: 14px; margin-top: 5px; }

        .review-card {
            background: var(--card); border-radius: 24px;
            padding: 25px; margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .info-row { margin-bottom: 20px; }
        .label { font-size: 11px; text-transform: uppercase; color: #6B7280; font-weight: 700; display: block; margin-bottom: 6px; }
        .value { font-size: 16px; font-weight: 600; color: #fff; }
        .value-amount { font-size: 32px; font-weight: 800; color: var(--accent); }

        /* INPUT DE SENHA */
        .password-section { margin-top: 30px; text-align: center; }
        .pin-container { display: flex; justify-content: center; gap: 15px; margin-top: 15px; }
        .pin-dot {
            width: 15px; height: 15px; border-radius: 50%;
            border: 2px solid #333; transition: 0.2s;
        }
        .pin-dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px var(--accent); }
        
        #hidden-pin { position: absolute; opacity: 0; pointer-events: none; }

        .footer { padding: 20px; background: #000; border-top: 1px solid #111; }
        .btn-confirm {
            width: 100%; background: var(--accent); color: #000; border: none;
            padding: 18px; border-radius: 15px; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .btn-confirm:disabled { background: #27272a; color: #71717a; }

        /* MODAL ZENTRY (O SEGREDO DA BLINDAGEM) */
        #zModalGlobal { 
            display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); 
            z-index:9999; align-items:center; justify-content:center; padding:20px; 
            backdrop-filter: blur(5px); 
        }
        .modal-content { 
            background:#121826; border:1px solid #2A3441; border-radius:28px; 
            width:100%; max-width:340px; padding:25px; text-align:center; 
            animation: popIn 0.2s ease-out; 
        }
        @keyframes popIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
    </style>
</head>
<body>

    <div id="zModalGlobal">
        <div class="modal-content">
            <div id="zIcon" style="font-size:40px; margin-bottom:15px;">⚠️</div>
            <h3 id="zTitle" style="margin:0 0 10px; font-size:18px; color:#fff;">Aviso</h3>
            <p id="zText" style="color:#9CA3AF; font-size:14px; margin-bottom:20px; line-height:1.5;"></p>
            <button id="zBtnClose" style="width:100%; padding:15px; border-radius:14px; background:#22C55E; border:none; color:#000; font-weight:700;">Entendido</button>
        </div>
    </div>

    <div class="header">
        <svg onclick="window.history.back()" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <h1>Revise seu Pix</h1>
    </div>

    <div class="content">
        <p>Confira os dados do destinatário.</p>

        <div class="review-card">
            <div class="info-row">
                <span class="label">Valor</span>
                <div class="value-amount" id="rev-val">R$ 0,00</div>
            </div>
            <div class="info-row">
                <span class="label">Para</span>
                <div class="value" id="rev-name">---</div>
            </div>
            <div class="info-row">
                <span class="label">Instituição</span>
                <div class="value" id="rev-bank">---</div>
            </div>
        </div>

        <div class="password-section" onclick="focarPin()">
            <span class="label">Digite sua senha de 4 dígitos</span>
            <div class="pin-container">
                <div class="pin-dot" id="dot-1"></div>
                <div class="pin-dot" id="dot-2"></div>
                <div class="pin-dot" id="dot-3"></div>
                <div class="pin-dot" id="dot-4"></div>
            </div>
            <input type="number" id="hidden-pin" pattern="\d*" inputmode="numeric" maxlength="4" oninput="atualizarDots(this)">
        </div>
    </div>

    <div class="footer">
        <button class="btn-confirm" id="btnFinal" onclick="executarTransferencia()" disabled>Confirmar e Enviar</button>
    </div>
    
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const transacao = JSON.parse(localStorage.getItem("transacao_pendente"));
    let userLogado = null;

    // Funções do Modal Blindado
    function showZModal(titulo, texto, icon) {
        document.getElementById('zModalGlobal').style.display = 'flex';
        document.getElementById('zTitle').innerText = titulo;
        document.getElementById('zText').innerText = texto;
        document.getElementById('zIcon').innerText = icon;
    }

    document.getElementById('zBtnClose').onclick = () => {
        document.getElementById('zModalGlobal').style.display = 'none';
        focarPin();
    };

    window.onload = () => {
        if(!transacao) { window.location.href = 'pix.html'; return; }
        document.getElementById('rev-val').innerText = transacao.valor;
        document.getElementById('rev-name').innerText = transacao.nomeDestino;
        document.getElementById('rev-bank').innerText = transacao.bancoDestino || "Zentry Bank";
        focarPin();
    };

    onAuthStateChanged(auth, (user) => { 
        if(user) { userLogado = user; } 
        else { window.location.href = 'login.html'; }
    });

    window.focarPin = () => document.getElementById('hidden-pin').focus();
    
    window.atualizarDots = (input) => {
        const val = input.value;
        if(val.length > 4) input.value = val.slice(0, 4);
        for(let i=1; i<=4; i++) {
            document.getElementById(`dot-${i}`).classList.toggle('active', i <= val.length);
        }
        document.getElementById('btnFinal').disabled = val.length < 4;
    };

    function limparPin() {
        document.getElementById('hidden-pin').value = "";
        for(let i=1; i<=4; i++) document.getElementById(`dot-${i}`).classList.remove('active');
        document.getElementById('btnFinal').disabled = true;
        document.getElementById('btnFinal').innerText = "Confirmar e Enviar";
    }

    window.executarTransferencia = async () => {
        const btn = document.getElementById('btnFinal');
        const pinDigitado = document.getElementById('hidden-pin').value;

        btn.innerText = "Processando...";
        btn.disabled = true;

        try {
            const remetenteRef = doc(db, "usuarios", userLogado.uid);
            const snap = await getDoc(remetenteRef);
            
            if(!snap.exists()) throw new Error("Usuário não encontrado");
            const dadosUser = snap.data();

            // 1. VALIDAÇÃO DE SENHA (BLINDADA)
            let senhaNoBanco = dadosUser.senha;
            if (!senhaNoBanco) {
                await updateDoc(remetenteRef, { senha: pinDigitado });
                senhaNoBanco = pinDigitado;
            }

            if(pinDigitado !== senhaNoBanco) {
                showZModal("Senha Incorreta", "A senha de 4 dígitos não confere. Tente novamente.", "🔒");
                limparPin();
                return;
            }

            // 2. VALIDAÇÃO DE SALDO (BLINDADA)
            const saldoAtual = parseFloat(dadosUser.saldo || 0);
            if(saldoAtual < transacao.valorNumerico) {
                showZModal("Saldo Insuficiente", "Você não possui saldo suficiente para esta transação.", "💸");
                setTimeout(() => { window.location.href = 'pix.html'; }, 3000);
                return;
            }

            // 3. EXECUÇÃO
            await updateDoc(remetenteRef, {
                saldo: increment(-transacao.valorNumerico),
                saida: increment(transacao.valorNumerico)
            });

            if(transacao.uidDestino && transacao.uidDestino !== "externo" && transacao.uidDestino !== "fake_id_123") {
                const destinoRef = doc(db, "usuarios", transacao.uidDestino);
                await updateDoc(destinoRef, {
                    saldo: increment(transacao.valorNumerico),
                    entrada: increment(transacao.valorNumerico)
                });
            }

            // 4. COMPROVANTE
            const dadosComprovante = {
                ...transacao,
                data: new Date().toLocaleString('pt-BR'),
                id: "ZNT" + Math.floor(100000 + Math.random() * 900000)
            };
            
            localStorage.setItem("comprovante_final", JSON.stringify(dadosComprovante));
            window.location.href = "comprovante.html";

        } catch (error) {
            console.error(error);
            showZModal("Erro no Sistema", "Não foi possível completar a operação. Tente mais tarde.", "⚠️");
            btn.innerText = "Confirmar e Enviar";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
