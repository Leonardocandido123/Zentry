<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <title>Comprovante de Recarga - TECH Pay</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #22c55e; --text-sec: #888; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* ESTILO CUPOM */
        .receipt {
            background: #fff; color: #000; width: 100%; max-width: 340px;
            padding: 40px 25px; border-radius: 4px; position: relative;
            margin-top: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        
        /* Círculos laterais para parecer cupom rasgado */
        .receipt::before, .receipt::after {
            content: ""; position: absolute; left: 0; right: 0; height: 10px;
            background-size: 20px 20px;
        }
        .receipt::before { top: -5px; background-image: radial-gradient(circle, var(--bg) 70%, transparent 75%); }
        .receipt::after { bottom: -5px; background-image: radial-gradient(circle, var(--bg) 70%, transparent 75%); }

        .logo-area { text-align: center; border-bottom: 1px dashed #ccc; padding-bottom: 20px; margin-bottom: 20px; }
        .logo-area b { font-size: 20px; letter-spacing: -1px; }
        
        .status-badge { background: rgba(34, 197, 94, 0.1); color: #16a34a; padding: 5px 12px; border-radius: 100px; font-size: 12px; font-weight: 700; display: inline-block; margin-bottom: 15px; }

        .row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .row span { color: #666; }
        .row b { color: #000; }

        .total-row { border-top: 2px solid #000; padding-top: 15px; margin-top: 15px; text-align: center; }
        .total-row h2 { margin: 0; font-size: 32px; font-weight: 800; }

        /* BOTÕES */
        .actions { width: 100%; max-width: 340px; margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }
        .btn { padding: 18px; border-radius: 16px; border: none; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .btn-share { background: #fff; color: #000; }
        .btn-done { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
        .btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

    <div style="text-align: center;">
        <div style="background: var(--accent); width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
        </div>
        <h2 style="margin: 0;">Recarga Concluída</h2>
        <p style="color: var(--text-sec); font-size: 14px;">O saldo estará disponível em breve.</p>
    </div>

    <div class="receipt" id="cupom">
        <div class="logo-area">
            <b>UP TECH PAYMENTS</b><br>
            <small style="color: #888;">Comprovante de Recarga</small>
        </div>

        <center><div class="status-badge">✓ SUCESSO</div></center>

        <div class="row"><span>Operadora</span><b id="res-op">-</b></div>
        <div class="row"><span>Telefone</span><b id="res-tel">-</b></div>
        <div class="row"><span>Data</span><b id="res-data">-</b></div>
        <div class="row"><span>Hora</span><b id="res-hora">-</b></div>
        <div class="row"><span>ID Transação</span><b>#<span id="res-id"></span></b></div>

        <div class="total-row">
            <span style="font-size: 12px; color: #666; text-transform: uppercase;">Valor Pago</span>
            <h2 id="res-val">R$ 0,00</h2>
        </div>
    </div>

    <div class="actions">
        <button class="btn btn-share" onclick="compartilhar()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8m-11-8l5-5 5 5m-5-5v11"/></svg>
            Enviar Comprovante
        </button>
        <button class="btn btn-done" onclick="location.href='home.html'">Concluir</button>
    </div>

    <script>
        const d = JSON.parse(localStorage.getItem('ultimaRecarga') || '{}');
        
        document.getElementById('res-op').innerText = d.operadora;
        document.getElementById('res-tel').innerText = d.telefone;
        document.getElementById('res-data').innerText = d.data;
        document.getElementById('res-hora').innerText = d.hora;
        document.getElementById('res-val').innerText = d.valor;
        document.getElementById('res-id').innerText = Math.floor(Math.random() * 99999999);

        async function compartilhar() {
            const texto = `*Comprovante de Recarga UP Tech*\n\n` +
                          `*Valor:* ${d.valor}\n` +
                          `*Operadora:* ${d.operadora}\n` +
                          `*Telefone:* ${d.telefone}\n` +
                          `*Data:* ${d.data} às ${d.hora}\n\n` +
                          `Recarga processada com sucesso via UP Tech!`;

            if (navigator.share) {
                try {
                    await navigator.share({ title: 'Comprovante UP Tech', text: texto });
                } catch (err) { console.log("Cancelado"); }
            } else {
                alert("Texto copiado para o WhatsApp!");
                navigator.clipboard.writeText(texto);
            }
        }
    </script>
</body>
</html>
